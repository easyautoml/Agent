<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <marker id="arrIn" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrOut" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="url(#bg)"/>

  <text x="480" y="38" text-anchor="middle" font-size="23" font-weight="700" fill="#f1f5f9">Connectors — Sync Your Existing Tools</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#94a3b8">Connect once. Supermemory keeps everything in sync automatically.</text>

  <!-- Services on left -->
  <!-- Google Drive -->
  <rect x="30" y="88" width="160" height="60" rx="12" fill="#1e293b" stroke="#4285f4" stroke-width="1.5"/>
  <text x="70" y="118" font-size="28">📁</text>
  <text x="110" y="110" font-size="13" font-weight="600" fill="#f1f5f9">Google Drive</text>
  <text x="110" y="128" font-size="10" fill="#64748b">Docs, Sheets, Slides</text>

  <!-- Gmail -->
  <rect x="30" y="162" width="160" height="60" rx="12" fill="#1e293b" stroke="#ea4335" stroke-width="1.5"/>
  <text x="70" y="192" font-size="28">✉️</text>
  <text x="110" y="184" font-size="13" font-weight="600" fill="#f1f5f9">Gmail</text>
  <text x="110" y="200" font-size="10" fill="#64748b">Emails &amp; threads</text>

  <!-- Notion -->
  <rect x="30" y="236" width="160" height="60" rx="12" fill="#1e293b" stroke="#ffffff" stroke-width="1.5"/>
  <text x="70" y="266" font-size="28">📝</text>
  <text x="110" y="258" font-size="13" font-weight="600" fill="#f1f5f9">Notion</text>
  <text x="110" y="274" font-size="10" fill="#64748b">Pages &amp; databases</text>

  <!-- Services on right side of left column -->
  <!-- OneDrive -->
  <rect x="30" y="310" width="160" height="60" rx="12" fill="#1e293b" stroke="#0078d4" stroke-width="1.5"/>
  <text x="70" y="340" font-size="28">☁️</text>
  <text x="110" y="332" font-size="13" font-weight="600" fill="#f1f5f9">OneDrive</text>
  <text x="110" y="348" font-size="10" fill="#64748b">Word, Excel, files</text>

  <!-- GitHub -->
  <rect x="30" y="384" width="160" height="60" rx="12" fill="#1e293b" stroke="#6e40c9" stroke-width="1.5"/>
  <text x="70" y="414" font-size="28">🐙</text>
  <text x="110" y="406" font-size="13" font-weight="600" fill="#f1f5f9">GitHub</text>
  <text x="110" y="422" font-size="10" fill="#64748b">Repos, issues, PRs</text>

  <!-- Web Crawler -->
  <rect x="210" y="310" width="140" height="60" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <text x="244" y="340" font-size="28">🌐</text>
  <text x="278" y="332" font-size="11" font-weight="600" fill="#f1f5f9">Web Crawler</text>
  <text x="278" y="348" font-size="10" fill="#64748b">Any URL / site</text>

  <!-- Arrows to hub -->
  <line x1="192" y1="118" x2="390" y2="240" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrIn)" stroke-dasharray="6,3"/>
  <line x1="192" y1="192" x2="390" y2="255" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrIn)" stroke-dasharray="6,3"/>
  <line x1="192" y1="266" x2="390" y2="268" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrIn)" stroke-dasharray="6,3"/>
  <line x1="192" y1="340" x2="390" y2="285" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrIn)" stroke-dasharray="6,3"/>
  <line x1="192" y1="414" x2="390" y2="300" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrIn)" stroke-dasharray="6,3"/>
  <line x1="352" y1="340" x2="390" y2="296" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrIn)" stroke-dasharray="6,3"/>

  <!-- HUB: SUPERMEMORY -->
  <rect x="370" y="180" width="220" height="200" rx="20" fill="url(#hubGrad)" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="480" y="218" text-anchor="middle" font-size="24">⬡</text>
  <text x="480" y="248" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">SUPER</text>
  <text x="480" y="268" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">MEMORY</text>
  <line x1="386" y1="280" x2="574" y2="280" stroke="#4c1d95" stroke-width="1"/>
  <text x="480" y="298" text-anchor="middle" font-size="10" fill="#a5b4fc">Auto-process &amp; index</text>
  <text x="480" y="314" text-anchor="middle" font-size="10" fill="#a5b4fc">Real-time webhooks</text>
  <text x="480" y="330" text-anchor="middle" font-size="10" fill="#a5b4fc">Cron sync (every 4h)</text>
  <text x="480" y="346" text-anchor="middle" font-size="10" fill="#a5b4fc">Deduplication</text>
  <text x="480" y="362" text-anchor="middle" font-size="10" fill="#a5b4fc">Smart chunking</text>

  <!-- Arrows out to right -->
  <line x1="592" y1="240" x2="640" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrOut)"/>
  <line x1="592" y1="260" x2="640" y2="260" stroke="#6366f1" stroke-width="2" marker-end="url(#arrOut)"/>
  <line x1="592" y1="320" x2="640" y2="380" stroke="#6366f1" stroke-width="2" marker-end="url(#arrOut)"/>

  <!-- Right side outputs -->
  <rect x="644" y="118" width="286" height="74" rx="12" fill="#1e293b" stroke="#6366f1"/>
  <text x="660" y="142" font-size="13" font-weight="700" fill="#f1f5f9">🔍 Searchable Knowledge Base</text>
  <text x="660" y="160" font-size="10" fill="#94a3b8">All your documents indexed and</text>
  <text x="660" y="176" font-size="10" fill="#94a3b8">ready to query in seconds</text>

  <rect x="644" y="224" width="286" height="74" rx="12" fill="#1e293b" stroke="#6366f1"/>
  <text x="660" y="248" font-size="13" font-weight="700" fill="#f1f5f9">🤖 AI Context</text>
  <text x="660" y="266" font-size="10" fill="#94a3b8">Your AI can reference any doc</text>
  <text x="660" y="282" font-size="10" fill="#94a3b8">from any connected service</text>

  <rect x="644" y="342" width="286" height="74" rx="12" fill="#1e293b" stroke="#6366f1"/>
  <text x="660" y="366" font-size="13" font-weight="700" fill="#f1f5f9">📊 Always Up-to-Date</text>
  <text x="660" y="384" font-size="10" fill="#94a3b8">Webhooks push new content</text>
  <text x="660" y="400" font-size="10" fill="#94a3b8">instantly. Nothing is stale.</text>

  <!-- Bottom example -->
  <rect x="30" y="455" width="900" height="36" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="480" y="468" text-anchor="middle" font-size="11" fill="#f1f5f9" font-weight="600">Example:</text>
  <text x="480" y="483" text-anchor="middle" font-size="11" fill="#94a3b8">You write a doc in Notion → Auto-synced → AI can answer questions about it immediately</text>
</svg>
