<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="960" height="500" fill="url(#bg)"/>

  <text x="480" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#f1f5f9">Quick Start — 3 Ways to Use Supermemory</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#94a3b8">Pick the path that fits you. No coding required for options A and B.</text>

  <!-- Option A: No code -->
  <rect x="22" y="80" width="280" height="380" rx="16" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="22" y="80" width="280" height="54" rx="16" fill="#065f46"/>
  <rect x="22" y="118" width="280" height="16" fill="#065f46"/>
  <text x="162" y="110" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">Option A — No Coding</text>
  <text x="162" y="130" text-anchor="middle" font-size="11" fill="#86efac">For everyone</text>

  <text x="162" y="164" text-anchor="middle" font-size="32">🌐</text>
  <text x="162" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Use the Web App</text>
  <text x="162" y="214" text-anchor="middle" font-size="11" fill="#94a3b8">Go to app.supermemory.ai</text>
  <text x="162" y="230" text-anchor="middle" font-size="11" fill="#94a3b8">Sign up (it's free)</text>
  <text x="162" y="246" text-anchor="middle" font-size="11" fill="#94a3b8">Start chatting — memory auto-builds</text>

  <line x1="38" y1="262" x2="286" y2="262" stroke="#334155" stroke-width="1"/>
  <text x="38" y="280" font-size="11" font-weight="600" fill="#10b981">Or install MCP plugin:</text>
  <rect x="38" y="288" width="246" height="48" rx="8" fill="#0f172a"/>
  <text x="161" y="308" text-anchor="middle" font-size="9" fill="#86efac" font-family="Courier New">npx -y install-mcp@latest</text>
  <text x="161" y="324" text-anchor="middle" font-size="9" fill="#86efac" font-family="Courier New">https://mcp.supermemory.ai/mcp</text>
  <text x="161" y="340" text-anchor="middle" font-size="9" fill="#86efac" font-family="Courier New">--client claude --oauth=yes</text>

  <text x="38" y="368" font-size="10" fill="#64748b">Works with:</text>
  <text x="38" y="384" font-size="11" fill="#f1f5f9">Claude, Cursor, Windsurf</text>
  <text x="38" y="400" font-size="11" fill="#f1f5f9">VS Code, OpenCode...</text>
  <text x="162" y="440" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">✓ Zero code needed</text>

  <!-- Option B: 2 lines -->
  <rect x="338" y="80" width="280" height="380" rx="16" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <rect x="338" y="80" width="280" height="54" rx="16" fill="#312e81"/>
  <rect x="338" y="118" width="280" height="16" fill="#312e81"/>
  <text x="478" y="110" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">Option B — 2 Lines of Code</text>
  <text x="478" y="130" text-anchor="middle" font-size="11" fill="#a5b4fc">For developers</text>

  <text x="478" y="164" text-anchor="middle" font-size="32">⚡</text>
  <text x="478" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Wrap Your AI Model</text>
  <text x="478" y="212" text-anchor="middle" font-size="11" fill="#94a3b8">Install the package:</text>

  <rect x="352" y="220" width="252" height="26" rx="7" fill="#0f172a"/>
  <text x="478" y="237" text-anchor="middle" font-size="10" fill="#a5b4fc" font-family="Courier New">npm install @supermemory/tools</text>

  <text x="352" y="264" font-size="10" fill="#94a3b8">Add memory to your model:</text>
  <rect x="352" y="272" width="252" height="62" rx="7" fill="#0f172a"/>
  <text x="360" y="290" font-size="9" fill="#6366f1" font-family="Courier New">import { withSupermemory }</text>
  <text x="360" y="304" font-size="9" fill="#6366f1" font-family="Courier New">  from "@supermemory/tools/ai-sdk"</text>
  <text x="360" y="320" font-size="9" fill="#10b981" font-family="Courier New">const model = withSupermemory(</text>
  <text x="360" y="334" font-size="9" fill="#10b981" font-family="Courier New">  openai("gpt-4o"), "user_id")</text>

  <text x="478" y="362" text-anchor="middle" font-size="11" fill="#94a3b8">Set your API key:</text>
  <rect x="352" y="370" width="252" height="26" rx="7" fill="#0f172a"/>
  <text x="478" y="387" text-anchor="middle" font-size="10" fill="#fde68a" font-family="Courier New">SUPERMEMORY_API_KEY=sm_...</text>

  <text x="478" y="440" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="600">✓ AI now has memory</text>

  <!-- Option C: Full API -->
  <rect x="654" y="80" width="280" height="380" rx="16" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="654" y="80" width="280" height="54" rx="16" fill="#4c1d95"/>
  <rect x="654" y="118" width="280" height="16" fill="#4c1d95"/>
  <text x="794" y="110" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">Option C — Full API</text>
  <text x="794" y="130" text-anchor="middle" font-size="11" fill="#c4b5fd">For power users &amp; builders</text>

  <text x="794" y="164" text-anchor="middle" font-size="32">🛠️</text>
  <text x="794" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Use the SDK Directly</text>

  <rect x="668" y="202" width="252" height="100" rx="7" fill="#0f172a"/>
  <text x="676" y="220" font-size="9" fill="#8b5cf6" font-family="Courier New">import Supermemory from "supermemory"</text>
  <text x="676" y="234" font-size="9" fill="#94a3b8" font-family="Courier New">const client = new Supermemory()</text>
  <text x="676" y="252" font-size="9" fill="#10b981" font-family="Courier New">// Save memory</text>
  <text x="676" y="266" font-size="9" fill="#f1f5f9" font-family="Courier New">await client.add({ content: "...",</text>
  <text x="676" y="280" font-size="9" fill="#f1f5f9" font-family="Courier New">  containerTag: "user_123" })</text>
  <text x="676" y="296" font-size="9" fill="#06b6d4" font-family="Courier New">// Get profile</text>

  <text x="668" y="320" font-size="11" font-weight="600" fill="#8b5cf6">Full API access:</text>
  <text x="668" y="336" font-size="10" fill="#94a3b8">• Add / search / delete memories</text>
  <text x="668" y="352" font-size="10" fill="#94a3b8">• Get user profiles</text>
  <text x="668" y="368" font-size="10" fill="#94a3b8">• Upload files</text>
  <text x="668" y="384" font-size="10" fill="#94a3b8">• Connect external services</text>
  <text x="668" y="400" font-size="10" fill="#94a3b8">• Configure memory settings</text>

  <text x="794" y="440" text-anchor="middle" font-size="11" fill="#8b5cf6" font-weight="600">✓ Full control</text>

  <!-- Get key bar -->
  <rect x="22" y="472" width="916" height="22" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="480" y="487" text-anchor="middle" font-size="11" fill="#94a3b8">Get your API key at console.supermemory.ai — starts with  sm_your_key_here</text>
</svg>
