<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="520" fill="url(#bg)"/>

  <text x="480" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#f1f5f9">Memory Graph — See How Your Memories Connect</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#94a3b8">A visual map of documents and the memories extracted from them</text>

  <!-- Graph area -->
  <rect x="30" y="74" width="660" height="420" rx="14" fill="#0c1424" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Connection lines (behind nodes) -->
  <!-- Doc1 to Mem1 -->
  <line x1="200" y1="190" x2="340" y2="160" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <!-- Doc1 to Mem2 -->
  <line x1="200" y1="190" x2="280" y2="300" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <!-- Doc2 to Mem2 -->
  <line x1="420" y1="230" x2="280" y2="300" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <!-- Doc2 to Mem3 -->
  <line x1="420" y1="230" x2="480" y2="140" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <!-- Doc2 to Mem4 -->
  <line x1="420" y1="230" x2="500" y2="340" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <!-- Doc3 to Mem4 -->
  <line x1="580" y1="290" x2="500" y2="340" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <!-- Doc3 to Mem5 -->
  <line x1="580" y1="290" x2="620" y2="180" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <!-- Doc4 to Mem3 -->
  <line x1="300" y1="420" x2="480" y2="140" stroke="#06b6d4" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  <!-- Mem1 to Mem2 (version chain) -->
  <line x1="340" y1="160" x2="280" y2="300" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <!-- Doc1 similar to Doc2 -->
  <line x1="200" y1="190" x2="420" y2="230" stroke="#10b981" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>

  <!-- DOC NODES (rectangles) -->
  <!-- Doc 1 -->
  <rect x="130" y="152" width="140" height="76" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" filter="url(#glowSm)"/>
  <text x="200" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#a5b4fc">📄 Meeting Notes</text>
  <text x="200" y="191" text-anchor="middle" font-size="9" fill="#64748b">Q1 Planning Session</text>
  <text x="200" y="207" text-anchor="middle" font-size="9" fill="#64748b">Jan 15, 2025</text>
  <text x="200" y="222" text-anchor="middle" font-size="8" fill="#4338ca">DOCUMENT</text>

  <!-- Doc 2 -->
  <rect x="350" y="192" width="140" height="76" rx="10" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2" filter="url(#glowSm)"/>
  <text x="420" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd">📄 Project Plan</text>
  <text x="420" y="231" text-anchor="middle" font-size="9" fill="#64748b">Backend Refactor v2</text>
  <text x="420" y="247" text-anchor="middle" font-size="9" fill="#64748b">Feb 3, 2025</text>
  <text x="420" y="262" text-anchor="middle" font-size="8" fill="#4338ca">DOCUMENT</text>

  <!-- Doc 3 -->
  <rect x="510" y="252" width="140" height="76" rx="10" fill="#164e63" stroke="#3b82f6" stroke-width="2" filter="url(#glowSm)"/>
  <text x="580" y="275" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">📄 Tech Spec</text>
  <text x="580" y="291" text-anchor="middle" font-size="9" fill="#64748b">API Design v3</text>
  <text x="580" y="307" text-anchor="middle" font-size="9" fill="#64748b">Feb 20, 2025</text>
  <text x="580" y="322" text-anchor="middle" font-size="8" fill="#1e40af">DOCUMENT</text>

  <!-- Doc 4 (dimmed / older) -->
  <rect x="220" y="385" width="160" height="60" rx="10" fill="#1a1a2e" stroke="#334155" stroke-width="1.5" opacity="0.7"/>
  <text x="300" y="408" text-anchor="middle" font-size="11" fill="#64748b">📄 Old Roadmap</text>
  <text x="300" y="424" text-anchor="middle" font-size="9" fill="#475569">Dec 2024 — older</text>
  <text x="300" y="438" text-anchor="middle" font-size="8" fill="#334155">DOCUMENT</text>

  <!-- MEMORY NODES (hexagons drawn as polygons) -->
  <!-- Mem 1: TypeScript preference -->
  <polygon points="340,130 368,147 368,178 340,195 312,178 312,147" fill="#2e1065" stroke="#8b5cf6" stroke-width="2" filter="url(#glowSm)"/>
  <text x="340" y="158" text-anchor="middle" font-size="9" fill="#c084fc">💜 TypeScript</text>
  <text x="340" y="172" text-anchor="middle" font-size="9" fill="#c084fc">preference</text>
  <text x="340" y="185" text-anchor="middle" font-size="7" fill="#7c3aed">MEMORY</text>

  <!-- Mem 2: Q1 goal -->
  <polygon points="280,268 308,285 308,316 280,333 252,316 252,285" fill="#1a3020" stroke="#10b981" stroke-width="2" filter="url(#glowSm)"/>
  <text x="280" y="296" text-anchor="middle" font-size="9" fill="#6ee7b7">🎯 Q1: launch</text>
  <text x="280" y="310" text-anchor="middle" font-size="9" fill="#6ee7b7">new API</text>
  <text x="280" y="323" text-anchor="middle" font-size="7" fill="#065f46">MEMORY</text>

  <!-- Mem 3: Deploy setup -->
  <polygon points="480,110 508,127 508,158 480,175 452,158 452,127" fill="#3a1a00" stroke="#f59e0b" stroke-width="2" filter="url(#glowSm)"/>
  <text x="480" y="138" text-anchor="middle" font-size="9" fill="#fde68a">🚀 Deploy:</text>
  <text x="480" y="152" text-anchor="middle" font-size="9" fill="#fde68a">Vercel + CI</text>
  <text x="480" y="165" text-anchor="middle" font-size="7" fill="#92400e">MEMORY</text>

  <!-- Mem 4: Backend refactor -->
  <polygon points="500,308 528,325 528,356 500,373 472,356 472,325" fill="#164e63" stroke="#06b6d4" stroke-width="2" filter="url(#glowSm)"/>
  <text x="500" y="336" text-anchor="middle" font-size="9" fill="#a5f3fc">🔧 Refactor:</text>
  <text x="500" y="350" text-anchor="middle" font-size="9" fill="#a5f3fc">auth module</text>
  <text x="500" y="363" text-anchor="middle" font-size="7" fill="#155e75">MEMORY</text>

  <!-- Mem 5: REST API -->
  <polygon points="620,148 648,165 648,196 620,213 592,196 592,165" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" filter="url(#glowSm)"/>
  <text x="620" y="176" text-anchor="middle" font-size="9" fill="#a5b4fc">📡 REST API</text>
  <text x="620" y="190" text-anchor="middle" font-size="9" fill="#a5b4fc">design pref</text>
  <text x="620" y="203" text-anchor="middle" font-size="7" fill="#4338ca">MEMORY</text>

  <!-- Legend (version chain arrow) -->
  <line x1="52" y1="433" x2="95" y2="433" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="102" y="437" font-size="10" fill="#f59e0b">Memory version chain (updated fact)</text>

  <line x1="52" y1="455" x2="95" y2="455" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="102" y="459" font-size="10" fill="#10b981">Similar documents</text>

  <line x1="52" y1="477" x2="95" y2="477" stroke="#6366f1" stroke-width="1.5"/>
  <text x="102" y="481" font-size="10" fill="#6366f1">Memory extracted from document</text>

  <!-- Shape legend -->
  <rect x="380" y="423" width="60" height="36" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="410" y="445" text-anchor="middle" font-size="10" fill="#a5b4fc">Rectangle</text>
  <text x="480" y="440" font-size="10" fill="#94a3b8">= Document</text>

  <polygon points="575,423 593,433 593,455 575,465 557,455 557,433" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="575" y="448" text-anchor="middle" font-size="8" fill="#c084fc">hex</text>
  <text x="604" y="450" font-size="10" fill="#94a3b8">= Memory fact</text>

  <!-- Right panel: details -->
  <rect x="702" y="74" width="228" height="420" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="816" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Graph Features</text>
  <line x1="716" y1="112" x2="916" y2="112" stroke="#334155" stroke-width="1"/>

  <text x="718" y="132" font-size="11" font-weight="600" fill="#6366f1">🖱️ Interactive</text>
  <text x="718" y="148" font-size="10" fill="#94a3b8">• Pan and zoom freely</text>
  <text x="718" y="163" font-size="10" fill="#94a3b8">• Drag nodes to arrange</text>
  <text x="718" y="178" font-size="10" fill="#94a3b8">• Click to see details</text>

  <text x="718" y="200" font-size="11" font-weight="600" fill="#10b981">🗂️ Filter &amp; Focus</text>
  <text x="718" y="216" font-size="10" fill="#94a3b8">• Filter by workspace</text>
  <text x="718" y="231" font-size="10" fill="#94a3b8">• Highlight related nodes</text>
  <text x="718" y="246" font-size="10" fill="#94a3b8">• Load more on demand</text>

  <text x="718" y="268" font-size="11" font-weight="600" fill="#f59e0b">🔗 Relationships</text>
  <text x="718" y="284" font-size="10" fill="#94a3b8">• Doc ↔ extracted facts</text>
  <text x="718" y="299" font-size="10" fill="#94a3b8">• Memory version chains</text>
  <text x="718" y="314" font-size="10" fill="#94a3b8">• Document similarity</text>

  <text x="718" y="336" font-size="11" font-weight="600" fill="#06b6d4">📊 Two Views</text>
  <rect x="718" y="344" width="194" height="26" rx="7" fill="#083344"/>
  <text x="718" y="361" font-size="10" fill="#a5f3fc" dx="8">console — full dev view</text>
  <rect x="718" y="374" width="194" height="26" rx="7" fill="#0f172a"/>
  <text x="718" y="391" font-size="10" fill="#94a3b8" dx="8">consumer — embedded UI</text>

  <text x="718" y="416" font-size="11" font-weight="600" fill="#8b5cf6">📦 Package</text>
  <rect x="718" y="424" width="194" height="26" rx="7" fill="#1a0b3a"/>
  <text x="816" y="441" text-anchor="middle" font-size="9" fill="#c084fc" font-family="Courier New">@supermemory/memory-graph</text>
  <text x="718" y="464" font-size="10" fill="#94a3b8">React 18+ component</text>
  <text x="718" y="480" font-size="10" fill="#94a3b8">Canvas 2D rendering</text>
</svg>
