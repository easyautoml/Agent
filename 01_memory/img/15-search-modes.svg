<svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
  </defs>
  <rect width="960" height="440" fill="url(#bg)"/>

  <text x="480" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#f1f5f9">Search Modes — Choose the Right Context</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#94a3b8">Three ways to retrieve memory depending on what you need</text>

  <!-- Mode 1: memories -->
  <rect x="30" y="80" width="278" height="324" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <rect x="30" y="80" width="278" height="48" rx="16" fill="#312e81"/>
  <rect x="30" y="112" width="278" height="16" fill="#312e81"/>
  <text x="169" y="112" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">memories</text>
  <text x="169" y="130" text-anchor="middle" font-size="11" fill="#a5b4fc">searchMode: "memories"</text>

  <text x="169" y="164" text-anchor="middle" font-size="30">🧠</text>
  <text x="169" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#c7d2fe">Personal Facts Only</text>
  <text x="169" y="214" text-anchor="middle" font-size="11" fill="#94a3b8">Searches only the memories</text>
  <text x="169" y="230" text-anchor="middle" font-size="11" fill="#94a3b8">extracted about THIS user</text>

  <line x1="46" y1="246" x2="292" y2="246" stroke="#334155" stroke-width="1"/>

  <text x="46" y="268" font-size="11" font-weight="600" fill="#6366f1">Returns:</text>
  <rect x="46" y="276" width="246" height="24" rx="6" fill="#0f172a"/>
  <text x="169" y="292" text-anchor="middle" font-size="10" fill="#c7d2fe">Personal facts about the user</text>
  <rect x="46" y="304" width="246" height="24" rx="6" fill="#0f172a"/>
  <text x="169" y="320" text-anchor="middle" font-size="10" fill="#c7d2fe">Preferences and past decisions</text>

  <text x="46" y="354" font-size="11" font-weight="600" fill="#6366f1">Best for:</text>
  <text x="46" y="370" font-size="10" fill="#94a3b8">• "What does this user prefer?"</text>
  <text x="46" y="386" font-size="10" fill="#94a3b8">• Personalization features</text>
  <text x="46" y="396" font-size="10" fill="#94a3b8">• User profile enrichment</text>

  <!-- Mode 2: documents -->
  <rect x="340" y="80" width="278" height="324" rx="16" fill="#083344" stroke="#06b6d4" stroke-width="2"/>
  <rect x="340" y="80" width="278" height="48" rx="16" fill="#155e75"/>
  <rect x="340" y="112" width="278" height="16" fill="#155e75"/>
  <text x="479" y="112" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">documents</text>
  <text x="479" y="130" text-anchor="middle" font-size="11" fill="#a5f3fc">searchMode: "documents"</text>

  <text x="479" y="164" text-anchor="middle" font-size="30">📄</text>
  <text x="479" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#a5f3fc">Knowledge Base Only</text>
  <text x="479" y="214" text-anchor="middle" font-size="11" fill="#94a3b8">Searches only uploaded docs,</text>
  <text x="479" y="230" text-anchor="middle" font-size="11" fill="#94a3b8">files and connector content</text>

  <line x1="356" y1="246" x2="602" y2="246" stroke="#334155" stroke-width="1"/>

  <text x="356" y="268" font-size="11" font-weight="600" fill="#06b6d4">Returns:</text>
  <rect x="356" y="276" width="246" height="24" rx="6" fill="#0f172a"/>
  <text x="479" y="292" text-anchor="middle" font-size="10" fill="#67e8f9">Document chunks from files</text>
  <rect x="356" y="304" width="246" height="24" rx="6" fill="#0f172a"/>
  <text x="479" y="320" text-anchor="middle" font-size="10" fill="#67e8f9">Content from connected services</text>

  <text x="356" y="354" font-size="11" font-weight="600" fill="#06b6d4">Best for:</text>
  <text x="356" y="370" font-size="10" fill="#94a3b8">• "What's in this document?"</text>
  <text x="356" y="386" font-size="10" fill="#94a3b8">• Knowledge base Q&amp;A</text>
  <text x="356" y="396" font-size="10" fill="#94a3b8">• Document retrieval (RAG)</text>

  <!-- Mode 3: hybrid -->
  <rect x="650" y="80" width="278" height="324" rx="16" fill="#1a2010" stroke="#10b981" stroke-width="2.5"/>
  <rect x="650" y="80" width="278" height="48" rx="16" fill="#14532d"/>
  <rect x="650" y="112" width="278" height="16" fill="#14532d"/>
  <text x="789" y="112" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">hybrid  ⭐ DEFAULT</text>
  <text x="789" y="130" text-anchor="middle" font-size="11" fill="#86efac">searchMode: "hybrid"</text>

  <text x="789" y="164" text-anchor="middle" font-size="30">⚡</text>
  <text x="789" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#86efac">Best of Both Worlds</text>
  <text x="789" y="214" text-anchor="middle" font-size="11" fill="#94a3b8">Searches memories AND docs</text>
  <text x="789" y="230" text-anchor="middle" font-size="11" fill="#94a3b8">in a single call. Ranked together.</text>

  <line x1="666" y1="246" x2="912" y2="246" stroke="#334155" stroke-width="1"/>

  <text x="666" y="268" font-size="11" font-weight="600" fill="#10b981">Returns:</text>
  <rect x="666" y="276" width="246" height="24" rx="6" fill="#0f172a"/>
  <text x="789" y="292" text-anchor="middle" font-size="10" fill="#a7f3d0">Personal memories (user-specific)</text>
  <rect x="666" y="304" width="246" height="24" rx="6" fill="#0f172a"/>
  <text x="789" y="320" text-anchor="middle" font-size="10" fill="#a7f3d0">Relevant documents — all ranked</text>

  <text x="666" y="354" font-size="11" font-weight="600" fill="#10b981">Best for:</text>
  <text x="666" y="370" font-size="10" fill="#94a3b8">• Almost everything</text>
  <text x="666" y="386" font-size="10" fill="#94a3b8">• AI assistants, support bots</text>
  <text x="666" y="396" font-size="10" fill="#94a3b8">• Rich, personalized answers</text>

  <!-- Bottom bar -->
  <rect x="30" y="415" width="900" height="18" rx="6" fill="#1e293b"/>
  <text x="480" y="428" text-anchor="middle" font-size="11" fill="#94a3b8">All modes are accessed through the same API endpoint — just change the searchMode parameter</text>
</svg>
