<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ECFDF5"/>
      <stop offset="100%" style="stop-color:#D1FAE5"/>
    </linearGradient>
    <linearGradient id="gw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000020"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrL" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="url(#bg)" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#064E3B">Gateway API — The Front Desk</text>
  <text x="450" y="57" text-anchor="middle" font-size="12" fill="#065F46">Handles all settings, files, and management — not the actual AI conversations</text>

  <!-- Frontend box left -->
  <rect x="30" y="80" width="180" height="360" rx="14" fill="white" filter="url(#sh)" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="30" y="80" width="180" height="44" rx="14" fill="#1E40AF"/>
  <rect x="30" y="108" width="180" height="16" fill="#1E40AF"/>
  <text x="120" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🖥️ Frontend</text>
  <text x="120" y="148" text-anchor="middle" font-size="11" fill="#374151">Browser UI</text>
  <text x="120" y="168" text-anchor="middle" font-size="11" fill="#374151">or</text>
  <text x="120" y="188" text-anchor="middle" font-size="11" fill="#374151">API Client</text>
  <text x="120" y="218" text-anchor="middle" font-size="11" fill="#374151">or</text>
  <text x="120" y="238" text-anchor="middle" font-size="11" fill="#374151">Python SDK</text>

  <!-- Arrows to/from gateway -->
  <line x1="210" y1="260" x2="252" y2="260" stroke="#059669" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="252" y1="280" x2="210" y2="280" stroke="#059669" stroke-width="2" marker-end="url(#arrL)"/>

  <!-- Gateway box center -->
  <rect x="254" y="80" width="390" height="360" rx="14" fill="white" filter="url(#sh)" stroke="#6EE7B7" stroke-width="2"/>
  <rect x="254" y="80" width="390" height="46" rx="14" fill="url(#gw)"/>
  <rect x="254" y="110" width="390" height="16" fill="url(#gw)"/>
  <text x="449" y="112" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🗂️  Gateway API  (Port 8001)</text>

  <!-- Endpoints -->
  <rect x="270" y="140" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="157" font-size="11" fill="#065F46"><tspan font-weight="bold">GET</tspan>  /api/models</text>
  <text x="500" y="157" font-size="10" fill="#6B7280">→ List available AI models</text>

  <rect x="270" y="170" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="187" font-size="11" fill="#065F46"><tspan font-weight="bold">GET/PUT</tspan>  /api/skills</text>
  <text x="500" y="187" font-size="10" fill="#6B7280">→ Manage skill modules</text>

  <rect x="270" y="200" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="217" font-size="11" fill="#065F46"><tspan font-weight="bold">POST</tspan>  /api/skills/install</text>
  <text x="500" y="217" font-size="10" fill="#6B7280">→ Install custom skill from ZIP</text>

  <rect x="270" y="230" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="247" font-size="11" fill="#065F46"><tspan font-weight="bold">GET</tspan>  /api/memory</text>
  <text x="500" y="247" font-size="10" fill="#6B7280">→ View memory data</text>

  <rect x="270" y="260" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="277" font-size="11" fill="#065F46"><tspan font-weight="bold">POST</tspan>  /api/memory/reload</text>
  <text x="500" y="277" font-size="10" fill="#6B7280">→ Force refresh memory</text>

  <rect x="270" y="290" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="307" font-size="11" fill="#065F46"><tspan font-weight="bold">POST</tspan>  /api/threads/:id/uploads</text>
  <text x="500" y="307" font-size="10" fill="#6B7280">→ Upload file to session</text>

  <rect x="270" y="320" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="337" font-size="11" fill="#065F46"><tspan font-weight="bold">GET</tspan>  /api/threads/:id/artifacts</text>
  <text x="500" y="337" font-size="10" fill="#6B7280">→ Download output files</text>

  <rect x="270" y="350" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="367" font-size="11" fill="#065F46"><tspan font-weight="bold">DELETE</tspan>  /api/threads/:id</text>
  <text x="500" y="367" font-size="10" fill="#6B7280">→ Delete conversation + files</text>

  <rect x="270" y="380" width="358" height="24" rx="6" fill="#ECFDF5"/>
  <text x="290" y="397" font-size="11" fill="#065F46"><tspan font-weight="bold">GET/PUT</tspan>  /api/mcp/config</text>
  <text x="500" y="397" font-size="10" fill="#6B7280">→ Manage MCP servers</text>

  <!-- Arrows to/from backend services -->
  <line x1="644" y1="260" x2="684" y2="260" stroke="#059669" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Backend services on right -->
  <rect x="686" y="80" width="184" height="360" rx="14" fill="white" filter="url(#sh)" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="686" y="80" width="184" height="44" rx="14" fill="#374151"/>
  <rect x="686" y="108" width="184" height="16" fill="#374151"/>
  <text x="778" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Backend Services</text>

  <rect x="700" y="136" width="156" height="40" rx="8" fill="#F0FDF4"/>
  <text x="778" y="153" text-anchor="middle" font-size="11" fill="#15803D" font-weight="bold">🧠 Memory</text>
  <text x="778" y="168" text-anchor="middle" font-size="10" fill="#6B7280">memory.json</text>

  <rect x="700" y="184" width="156" height="40" rx="8" fill="#EFF6FF"/>
  <text x="778" y="201" text-anchor="middle" font-size="11" fill="#1D4ED8" font-weight="bold">📚 Skills</text>
  <text x="778" y="216" text-anchor="middle" font-size="10" fill="#6B7280">skills/ folder</text>

  <rect x="700" y="232" width="156" height="40" rx="8" fill="#FFF7ED"/>
  <text x="778" y="249" text-anchor="middle" font-size="11" fill="#D97706" font-weight="bold">📁 Uploads</text>
  <text x="778" y="264" text-anchor="middle" font-size="10" fill="#6B7280">thread files</text>

  <rect x="700" y="280" width="156" height="40" rx="8" fill="#F5F3FF"/>
  <text x="778" y="297" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="bold">🔌 MCP Config</text>
  <text x="778" y="312" text-anchor="middle" font-size="10" fill="#6B7280">extensions_config.json</text>

  <rect x="700" y="328" width="156" height="40" rx="8" fill="#FFF1F2"/>
  <text x="778" y="345" text-anchor="middle" font-size="11" fill="#B91C1C" font-weight="bold">📦 Models</text>
  <text x="778" y="360" text-anchor="middle" font-size="10" fill="#6B7280">config.yaml</text>

  <!-- File upload note -->
  <rect x="60" y="458" width="780" height="44" rx="10" fill="#059669" filter="url(#sh)"/>
  <text x="450" y="477" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📎 File Upload: Auto-converts PDF, Word, Excel, PowerPoint → Markdown for the AI to read</text>
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="#D1FAE5">Each upload is stored in a thread-specific folder — safe, isolated, downloadable</text>
</svg>
