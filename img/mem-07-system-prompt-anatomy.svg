  <!-- SEPARATOR LINE -->
  <line x1="70" y1="648" x2="860" y2="648" stroke="#334155" stroke-width="2"/>

  <!-- USER MESSAGE -->
  <rect x="70" y="650" width="790" height="68" fill="#1E293B"/>
  <text x="90" y="672" font-size="12" fill="#94A3B8">30</text>
  <text x="130" y="672" font-size="12" fill="#7DD3FC">[User message injected by LangGraph]</text>
  <text x="90" y="692" font-size="12" fill="#94A3B8">31</text>
  <text x="130" y="692" font-size="12" fill="#E2E8F0">"Find the latest AI news and make me a 5-min podcast"</text>
  <rect x="680" y="656" width="170" height="56" rx="4" fill="#1E293B"/>
  <text x="765" y="680" text-anchor="middle" font-size="10" fill="#7DD3FC">Your message</text>
  <text x="765" y="696" text-anchor="middle" font-size="10" fill="#7DD3FC">arrives here</text>

  <!-- SEPARATOR LINE -->
  <line x1="70" y1="720" x2="860" y2="720" stroke="#334155" stroke-width="2"/>

