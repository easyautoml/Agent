  <text x="130" y="594" font-size="12" fill="#F87171">&lt;clarification_system&gt;  &lt;citations&gt;  &lt;critical_reminders&gt;</text>
  <rect x="680" y="582" width="170" height="32" rx="4" fill="#1E293B"/>
  <text x="765" y="602" text-anchor="middle" font-size="10" fill="#64748B">Behavior rules</text>

