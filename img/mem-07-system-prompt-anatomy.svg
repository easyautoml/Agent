  <text x="90" y="748" font-size="12" fill="#94A3B8">→</text>
  <text x="130" y="748" font-size="12" fill="#86EFAC" font-weight="bold">AI reads ALL of the above, then responds</text>
  <text x="130" y="768" font-size="11" fill="#6EE7B7">Memory gives context: knows you prefer bullets → responds in bullets</text>
  <text x="130" y="786" font-size="11" fill="#6EE7B7">Memory gives context: knows your tech stack → gives relevant examples</text>
  <text x="130" y="804" font-size="11" fill="#6EE7B7">Memory gives context: knows your role → right level of detail</text>
