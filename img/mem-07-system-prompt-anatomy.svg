  <text x="90" y="362" font-size="12" fill="#94A3B8">16</text>
  <text x="130" y="362" font-size="12" fill="#F87171">&lt;thinking_style&gt;</text>
  <text x="90" y="380" font-size="12" fill="#94A3B8">17</text>
  <text x="130" y="380" font-size="12" fill="#94A3B8">  Think concisely and strategically...</text>
  <text x="90" y="398" font-size="12" fill="#94A3B8">18</text>
  <text x="130" y="398" font-size="12" fill="#F87171">&lt;/thinking_style&gt;</text>
  <rect x="680" y="350" width="170" height="56" rx="4" fill="#1E293B"/>
  <text x="765" y="380" text-anchor="middle" font-size="10" fill="#64748B">Reasoning</text>
  <text x="765" y="396" text-anchor="middle" font-size="10" fill="#64748B">instructions</text>

  <!-- BLOCK 5: skill_system -->
  <text x="90" y="420" font-size="12" fill="#94A3B8">19</text>
  <text x="130" y="420" font-size="12" fill="#F87171">&lt;skill_system&gt;</text>
  <text x="90" y="438" font-size="12" fill="#94A3B8">20</text>
  <text x="130" y="438" font-size="12" fill="#94A3B8">  [available skills list with paths]</text>
  <text x="90" y="456" font-size="12" fill="#94A3B8">21</text>
  <text x="130" y="456" font-size="12" fill="#F87171">&lt;/skill_system&gt;</text>
  <rect x="680" y="408" width="170" height="56" rx="4" fill="#1E293B"/>
  <text x="765" y="434" text-anchor="middle" font-size="10" fill="#64748B">Skill recipes</text>
  <text x="765" y="450" text-anchor="middle" font-size="10" fill="#64748B">available</text>

  <!-- BLOCK 6: subagent_system (conditional) -->
  <text x="90" y="478" font-size="12" fill="#94A3B8">22</text>
  <text x="130" y="478" font-size="12" fill="#F87171">&lt;subagent_system&gt;  </text>
  <text x="350" y="478" font-size="11" fill="#FCD34D">[only if subagent_enabled=true]</text>
  <text x="90" y="496" font-size="12" fill="#94A3B8">23</text>
  <text x="130" y="496" font-size="12" fill="#94A3B8">  DECOMPOSE, DELEGATE, SYNTHESIZE...</text>
  <text x="90" y="514" font-size="12" fill="#94A3B8">24</text>
  <text x="130" y="514" font-size="12" fill="#F87171">&lt;/subagent_system&gt;</text>
  <rect x="680" y="466" width="170" height="56" rx="4" fill="#1E293B"/>
  <text x="765" y="492" text-anchor="middle" font-size="10" fill="#64748B">Sub-agent</text>
  <text x="765" y="508" text-anchor="middle" font-size="10" fill="#64748B">orchestration rules</text>

