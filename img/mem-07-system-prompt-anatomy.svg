      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000040"/></filter>
    <filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#86EFAC60"/></filter>
  </defs>

  <rect width="880" height="820" fill="url(#bg)" rx="16"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="880" height="44" rx="16" fill="#1E293B"/>
  <rect x="0" y="28" width="880" height="16" fill="#1E293B"/>
  <circle cx="28" cy="22" r="7" fill="#EF4444"/>
  <circle cx="52" cy="22" r="7" fill="#F59E0B"/>
  <circle cx="76" cy="22" r="7" fill="#10B981"/>
  <text x="440" y="26" text-anchor="middle" font-size="13" font-weight="bold" fill="#94A3B8">System Prompt Anatomy — Where Memory Lives</text>

