  <rect x="680" y="58" width="170" height="32" rx="4" fill="#1E293B"/>
  <text x="765" y="76" text-anchor="middle" font-size="10" fill="#64748B">Agent identity</text>

  <!-- BLOCK 2: soul -->
  <text x="90" y="112" font-size="12" fill="#94A3B8">3</text>
  <text x="130" y="112" font-size="12" fill="#F87171">&lt;soul&gt;</text>
  <text x="90" y="130" font-size="12" fill="#94A3B8">4</text>
  <text x="130" y="130" font-size="12" fill="#94A3B8">  [agent personality — from SOUL.md]</text>
  <text x="90" y="148" font-size="12" fill="#94A3B8">5</text>
  <text x="130" y="148" font-size="12" fill="#F87171">&lt;/soul&gt;</text>
  <rect x="680" y="100" width="170" height="56" rx="4" fill="#1E293B"/>
  <text x="765" y="126" text-anchor="middle" font-size="10" fill="#64748B">Custom</text>
  <text x="765" y="142" text-anchor="middle" font-size="10" fill="#64748B">personality</text>

  <!-- SEPARATOR LINE -->
  <line x1="70" y1="160" x2="860" y2="160" stroke="#1E3A5F" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- BLOCK 3: memory — HIGHLIGHTED -->
  <rect x="70" y="162" width="790" height="178" fill="#0D2A1A" filter="url(#glow)"/>
  <rect x="70" y="162" width="5" height="178" fill="#86EFAC"/>

  <text x="90" y="184" font-size="12" fill="#94A3B8">6</text>
  <text x="130" y="184" font-size="12" fill="#86EFAC" font-weight="bold">&lt;memory&gt;</text>
  <rect x="680" y="162" width="176" height="20" rx="0" fill="#134E2B"/>
  <text x="768" y="176" text-anchor="middle" font-size="10" fill="#86EFAC" font-weight="bold">← INJECTED HERE</text>

  <text x="90" y="204" font-size="12" fill="#94A3B8">7</text>
  <text x="130" y="204" font-size="11" fill="#6EE7B7">  User Context:</text>
  <text x="90" y="222" font-size="12" fill="#94A3B8">8</text>
  <text x="130" y="222" font-size="11" fill="#86EFAC">  - Work: PM at startup, uses Python + React</text>
  <text x="90" y="240" font-size="12" fill="#94A3B8">9</text>
  <text x="130" y="240" font-size="11" fill="#86EFAC">  - Current Focus: Preparing Q3 report...</text>
  <text x="90" y="258" font-size="12" fill="#94A3B8">10</text>
  <text x="130" y="258" font-size="11" fill="#6EE7B7">  History:</text>
  <text x="90" y="276" font-size="12" fill="#94A3B8">11</text>
  <text x="130" y="276" font-size="11" fill="#86EFAC">  - Recent: worked on AI research, slides...</text>
  <text x="90" y="294" font-size="12" fill="#94A3B8">12</text>
  <text x="130" y="294" font-size="11" fill="#6EE7B7">  Facts:</text>
  <text x="90" y="312" font-size="12" fill="#94A3B8">13</text>
  <text x="130" y="312" font-size="11" fill="#FDE68A">  - [preference|0.95] Prefers bullet points</text>
  <text x="90" y="330" font-size="12" fill="#94A3B8">14</text>
  <text x="130" y="330" font-size="11" fill="#86EFAC">  - [knowledge |0.88] Uses Python + React</text>
  <text x="90" y="336" font-size="12" fill="#94A3B8">15</text>
  <text x="130" y="336" font-size="11" fill="#86EFAC" font-weight="bold">&lt;/memory&gt;</text>

  <rect x="680" y="184" width="176" height="152" rx="4" fill="#134E2B"/>
  <text x="768" y="210" text-anchor="middle" font-size="10" fill="#86EFAC">format_memory_for_injection()</text>
  <text x="768" y="228" text-anchor="middle" font-size="10" fill="#6EE7B7">ranked by confidence</text>
  <text x="768" y="246" text-anchor="middle" font-size="10" fill="#6EE7B7">≤ 2000 tokens</text>
  <text x="768" y="264" text-anchor="middle" font-size="10" fill="#6EE7B7">tiktoken counted</text>
  <text x="768" y="282" text-anchor="middle" font-size="10" fill="#6EE7B7">per-agent OR global</text>
  <text x="768" y="300" text-anchor="middle" font-size="10" fill="#6EE7B7">memory.json</text>
  <text x="768" y="320" text-anchor="middle" font-size="10" fill="#6EE7B7">injected_enabled flag</text>

  <!-- SEPARATOR LINE -->
