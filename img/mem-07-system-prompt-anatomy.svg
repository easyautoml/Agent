  <text x="130" y="536" font-size="12" fill="#F87171">&lt;working_directory&gt;</text>
  <text x="90" y="554" font-size="12" fill="#94A3B8">26</text>
  <text x="130" y="554" font-size="12" fill="#94A3B8">  /mnt/user-data/{uploads,workspace,outputs}</text>
  <text x="90" y="572" font-size="12" fill="#94A3B8">27</text>
  <text x="130" y="572" font-size="12" fill="#F87171">&lt;/working_directory&gt;</text>
  <rect x="680" y="524" width="170" height="56" rx="4" fill="#1E293B"/>
