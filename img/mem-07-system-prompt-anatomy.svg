  <text x="350" y="628" font-size="12" fill="#E2E8F0">2025-04-01, Tuesday</text>
  <text x="610" y="628" font-size="12" fill="#FDE68A">&lt;/current_date&gt;</text>
  <rect x="680" y="616" width="170" height="26" rx="4" fill="#1E293B"/>
