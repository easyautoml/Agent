<svg viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F9FF"/>
      <stop offset="100%" style="stop-color:#E0F2FE"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/></filter>
  </defs>

  <rect width="980" height="640" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="490" y="38" text-anchor="middle" font-size="21" font-weight="bold" fill="#0C4A6E">DeerFlow — System Architecture</text>
  <text x="490" y="60" text-anchor="middle" font-size="12" fill="#64748B">How all pieces fit together</text>

  <!-- USER -->
  <rect x="380" y="76" width="220" height="52" rx="12" fill="#1E40AF" filter="url(#shadow)"/>
  <text x="490" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="white">👤 YOU (User)</text>
  <text x="490" y="117" text-anchor="middle" font-size="11" fill="#BFDBFE">Browser · Telegram · Slack · Feishu</text>

  <!-- Arrow down to NGINX -->
  <line x1="490" y1="128" x2="490" y2="156" stroke="#3B82F6" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- NGINX -->
  <rect x="300" y="158" width="380" height="52" rx="12" fill="#0369A1" filter="url(#shadow)"/>
  <text x="490" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🔀 NGINX  (Port 2026)</text>
  <text x="490" y="198" text-anchor="middle" font-size="11" fill="#BAE6FD">Unified entry point — routes every request</text>

  <!-- Arrow left: /api/langgraph/* -->
  <path d="M 340 210 L 220 210 L 220 260" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="235" text-anchor="middle" font-size="10" fill="#1E40AF">/api/langgraph/*</text>

  <!-- Arrow right: /api/* -->
  <path d="M 640 210 L 760 210 L 760 260" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="710" y="235" text-anchor="middle" font-size="10" fill="#1E40AF">/api/*  (other)</text>

  <!-- Arrow center: / (frontend) -->
  <line x1="490" y1="210" x2="490" y2="260" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowGray)"/>
  <text x="510" y="238" font-size="10" fill="#64748B">/  (web page)</text>

  <!-- LangGraph Server -->
  <rect x="60" y="262" width="320" height="230" rx="14" fill="white" filter="url(#shadow)" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="60" y="262" width="320" height="40" rx="14" fill="#1D4ED8"/>
  <rect x="60" y="284" width="320" height="18" fill="#1D4ED8"/>
  <text x="220" y="287" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚙️ LangGraph Server  (Port 2024)</text>

  <!-- Lead Agent box -->
  <rect x="80" y="314" width="280" height="160" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="220" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">🧠 Lead Agent</text>
  <rect x="92" y="340" width="256" height="22" rx="6" fill="#DBEAFE"/>
  <text x="220" y="356" text-anchor="middle" font-size="11" fill="#1E40AF">Middleware Chain (12 steps)</text>
  <rect x="92" y="368" width="256" height="22" rx="6" fill="#DBEAFE"/>
  <text x="220" y="384" text-anchor="middle" font-size="11" fill="#1E40AF">AI Model (thinks &amp; decides)</text>
  <rect x="92" y="396" width="256" height="22" rx="6" fill="#DBEAFE"/>
  <text x="220" y="412" text-anchor="middle" font-size="11" fill="#1E40AF">Tool System (acts on decisions)</text>
  <rect x="92" y="424" width="256" height="22" rx="6" fill="#DBEAFE"/>
  <text x="220" y="440" text-anchor="middle" font-size="11" fill="#1E40AF">Sub-Agents (parallel helpers)</text>

  <!-- Gateway API -->
  <rect x="600" y="262" width="320" height="230" rx="14" fill="white" filter="url(#shadow)" stroke="#D1FAE5" stroke-width="1.5"/>
  <rect x="600" y="262" width="320" height="40" rx="14" fill="#059669"/>
  <rect x="600" y="284" width="320" height="18" fill="#059669"/>
  <text x="760" y="287" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🗂️ Gateway API  (Port 8001)</text>
  <rect x="618" y="314" width="284" height="24" rx="7" fill="#ECFDF5"/>
  <text x="760" y="331" text-anchor="middle" font-size="11" fill="#065F46">📦 Models management</text>
  <rect x="618" y="344" width="284" height="24" rx="7" fill="#ECFDF5"/>
  <text x="760" y="361" text-anchor="middle" font-size="11" fill="#065F46">🧩 Skills management</text>
  <rect x="618" y="374" width="284" height="24" rx="7" fill="#ECFDF5"/>
  <text x="760" y="391" text-anchor="middle" font-size="11" fill="#065F46">🧠 Memory management</text>
  <rect x="618" y="404" width="284" height="24" rx="7" fill="#ECFDF5"/>
  <text x="760" y="421" text-anchor="middle" font-size="11" fill="#065F46">📁 File uploads &amp; artifacts</text>
  <rect x="618" y="434" width="284" height="24" rx="7" fill="#ECFDF5"/>
  <text x="760" y="451" text-anchor="middle" font-size="11" fill="#065F46">🔌 MCP server config</text>

  <!-- Frontend -->
  <rect x="386" y="262" width="208" height="60" rx="12" fill="white" filter="url(#shadow)" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="490" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">🖥️ Frontend</text>
  <text x="490" y="308" text-anchor="middle" font-size="11" fill="#78350F">Next.js  (Port 3000)</text>

  <!-- Sandbox -->
  <rect x="60" y="518" width="320" height="90" rx="12" fill="white" filter="url(#shadow)" stroke="#FCA5A5" stroke-width="1.5"/>
  <rect x="60" y="518" width="320" height="36" rx="12" fill="#B91C1C"/>
  <rect x="60" y="536" width="320" height="18" fill="#B91C1C"/>
  <text x="220" y="542" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🛡️ Sandbox  (Docker / Local)</text>
  <text x="100" y="572" font-size="11" fill="#374151">📁 uploads/  workspace/  outputs/</text>
  <text x="100" y="592" font-size="11" fill="#374151">📚 skills/  (recipe books for the AI)</text>

  <!-- Memory Storage -->
  <rect x="600" y="518" width="320" height="90" rx="12" fill="white" filter="url(#shadow)" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="600" y="518" width="320" height="36" rx="12" fill="#7C3AED"/>
  <rect x="600" y="536" width="320" height="18" fill="#7C3AED"/>
  <text x="760" y="542" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🧠 Memory  (memory.json)</text>
  <text x="640" y="572" font-size="11" fill="#374151">👤 User context, preferences, history</text>
  <text x="640" y="592" font-size="11" fill="#374151">📋 Facts extracted from every session</text>

  <!-- Arrow: Lead Agent to Sandbox -->
  <line x1="220" y1="492" x2="220" y2="516" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="235" y="508" font-size="9" fill="#B91C1C">runs code</text>

  <!-- Arrow: Gateway to Memory -->
  <line x1="760" y1="492" x2="760" y2="516" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="772" y="508" font-size="9" fill="#7C3AED">stores</text>

  <!-- IM Channels legend -->
  <rect x="380" y="390" width="220" height="98" rx="10" fill="white" filter="url(#shadow)" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="490" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">💬 IM Channels</text>
  <text x="490" y="432" text-anchor="middle" font-size="11" fill="#6B7280">📱 Telegram</text>
  <text x="490" y="452" text-anchor="middle" font-size="11" fill="#6B7280">💬 Slack</text>
  <text x="490" y="472" text-anchor="middle" font-size="11" fill="#6B7280">🪶 Feishu / Lark</text>
</svg>
