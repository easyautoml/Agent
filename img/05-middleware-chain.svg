<svg viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFF"/>
      <stop offset="100%" style="stop-color:#EFF6FF"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="900" height="720" fill="url(#bg)" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E3A8A">Middleware Chain — The Pre-flight Checklist</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748B">12 automatic steps that run before the AI generates every response</text>

  <!-- INPUT pill -->
  <rect x="340" y="72" width="220" height="36" rx="18" fill="#374151"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📨 Your Request Arrives</text>
  <line x1="450" y1="108" x2="450" y2="124" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Middleware items — 2 columns -->
  <!-- Left column: 1-6 -->
  <!-- Right column: 7-12 -->

  <!-- MW 1 -->
  <rect x="60" y="128" width="360" height="44" rx="10" fill="#DBEAFE" filter="url(#sh)" stroke="#93C5FD" stroke-width="1"/>
  <text x="80" y="147" font-size="12" font-weight="bold" fill="#1E40AF">① ThreadData</text>
  <text x="80" y="163" font-size="11" fill="#3B82F6">Creates private folder for this conversation</text>
  <line x1="240" y1="172" x2="240" y2="188" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 2 -->
  <rect x="60" y="190" width="360" height="44" rx="10" fill="#D1FAE5" filter="url(#sh)" stroke="#6EE7B7" stroke-width="1"/>
  <text x="80" y="209" font-size="12" font-weight="bold" fill="#065F46">② Uploads</text>
  <text x="80" y="225" font-size="11" fill="#059669">Notices new files you uploaded → tells the AI</text>
  <line x1="240" y1="234" x2="240" y2="250" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 3 -->
  <rect x="60" y="252" width="360" height="44" rx="10" fill="#FEF3C7" filter="url(#sh)" stroke="#FCD34D" stroke-width="1"/>
  <text x="80" y="271" font-size="12" font-weight="bold" fill="#92400E">③ Sandbox</text>
  <text x="80" y="287" font-size="11" fill="#D97706">Opens the safe isolated workspace for code</text>
  <line x1="240" y1="296" x2="240" y2="312" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 4 -->
  <rect x="60" y="314" width="360" height="44" rx="10" fill="#FCE7F3" filter="url(#sh)" stroke="#F9A8D4" stroke-width="1"/>
  <text x="80" y="333" font-size="12" font-weight="bold" fill="#9D174D">④ DanglingTool</text>
  <text x="80" y="349" font-size="11" fill="#BE185D">Fixes broken tool calls left from previous steps</text>
  <line x1="240" y1="358" x2="240" y2="374" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 5 -->
  <rect x="60" y="376" width="360" height="44" rx="10" fill="#FEE2E2" filter="url(#sh)" stroke="#FCA5A5" stroke-width="1"/>
  <text x="80" y="395" font-size="12" font-weight="bold" fill="#991B1B">⑤ Guardrail</text>
  <text x="80" y="411" font-size="11" fill="#B91C1C">Safety check — blocks forbidden actions</text>
  <line x1="240" y1="420" x2="240" y2="436" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 6 -->
  <rect x="60" y="438" width="360" height="44" rx="10" fill="#EDE9FE" filter="url(#sh)" stroke="#C4B5FD" stroke-width="1"/>
  <text x="80" y="457" font-size="12" font-weight="bold" fill="#5B21B6">⑥ Summarize</text>
  <text x="80" y="473" font-size="11" fill="#7C3AED">Shrinks old chat history when context gets too long</text>

  <!-- Right column: MW 7-12 -->

  <!-- MW 7 -->
  <rect x="480" y="128" width="360" height="44" rx="10" fill="#FEF9C3" filter="url(#sh)" stroke="#FDE047" stroke-width="1"/>
  <text x="500" y="147" font-size="12" font-weight="bold" fill="#713F12">⑦ TodoList</text>
  <text x="500" y="163" font-size="11" fill="#A16207">Tracks tasks step-by-step in "plan mode"</text>
  <line x1="660" y1="172" x2="660" y2="188" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 8 -->
  <rect x="480" y="190" width="360" height="44" rx="10" fill="#F0FDF4" filter="url(#sh)" stroke="#86EFAC" stroke-width="1"/>
  <text x="500" y="209" font-size="12" font-weight="bold" fill="#14532D">⑧ Title</text>
  <text x="500" y="225" font-size="11" fill="#15803D">Auto-names the conversation after first message</text>
  <line x1="660" y1="234" x2="660" y2="250" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 9 -->
  <rect x="480" y="252" width="360" height="44" rx="10" fill="#F5F3FF" filter="url(#sh)" stroke="#A78BFA" stroke-width="1"/>
  <text x="500" y="271" font-size="12" font-weight="bold" fill="#4C1D95">⑨ Memory</text>
  <text x="500" y="287" font-size="11" fill="#6D28D9">Queues conversation for background memory update</text>
  <line x1="660" y1="296" x2="660" y2="312" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 10 -->
  <rect x="480" y="314" width="360" height="44" rx="10" fill="#FFF7ED" filter="url(#sh)" stroke="#FED7AA" stroke-width="1"/>
  <text x="500" y="333" font-size="12" font-weight="bold" fill="#7C2D12">⑩ ViewImage</text>
  <text x="500" y="349" font-size="11" fill="#C2410C">Reads images → converts to data for the AI</text>
  <line x1="660" y1="358" x2="660" y2="374" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 11 -->
  <rect x="480" y="376" width="360" height="44" rx="10" fill="#ECFDF5" filter="url(#sh)" stroke="#6EE7B7" stroke-width="1"/>
  <text x="500" y="395" font-size="12" font-weight="bold" fill="#065F46">⑪ SubagentLimit</text>
  <text x="500" y="411" font-size="11" fill="#047857">Limits to max 3 sub-agents running at once</text>
  <line x1="660" y1="420" x2="660" y2="436" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MW 12 -->
  <rect x="480" y="438" width="360" height="44" rx="10" fill="#FFF1F2" filter="url(#sh)" stroke="#FCA5A5" stroke-width="1"/>
  <text x="500" y="457" font-size="12" font-weight="bold" fill="#881337">⑫ Clarify  ← Must be LAST</text>
  <text x="500" y="473" font-size="11" fill="#BE123C">Stops &amp; asks you a question if info is missing</text>

  <!-- Middle connector line -->
  <line x1="420" y1="460" x2="480" y2="460" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="150" x2="480" y2="150" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="212" x2="480" y2="212" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="274" x2="480" y2="274" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="336" x2="480" y2="336" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="398" x2="480" y2="398" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Bottom: AI Responds -->
  <line x1="240" y1="482" x2="240" y2="540" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="660" y1="482" x2="660" y2="540" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="240" y1="540" x2="660" y2="540" stroke="#94A3B8" stroke-width="2"/>
  <line x1="450" y1="540" x2="450" y2="564" stroke="#94A3B8" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="290" y="566" width="320" height="48" rx="14" fill="#1D4ED8" filter="url(#sh)"/>
  <text x="450" y="588" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🧠 AI Model Thinks &amp; Responds</text>
  <text x="450" y="606" text-anchor="middle" font-size="11" fill="#BFDBFE">All checks passed — safe to generate answer</text>

  <!-- Note -->
  <rect x="100" y="634" width="700" height="60" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="450" y="654" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">💡 Why does this matter?</text>
  <text x="450" y="674" text-anchor="middle" font-size="11" fill="#64748B">These steps run automatically — you never see them. They keep your data safe,</text>
  <text x="450" y="690" text-anchor="middle" font-size="11" fill="#64748B">the AI focused, and the conversation efficient.</text>
</svg>
