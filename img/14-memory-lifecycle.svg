<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <marker id="arrF" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="url(#bg)"/>

  <text x="480" y="36" text-anchor="middle" font-size="23" font-weight="700" fill="#f1f5f9">Memory Lifecycle — Born, Updated, Forgotten</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#94a3b8">How a single piece of memory changes over time</text>

  <!-- Timeline axis -->
  <line x1="50" y1="420" x2="920" y2="420" stroke="#334155" stroke-width="2"/>
  <polygon points="920,415 934,420 920,425" fill="#334155"/>
  <text x="940" y="424" font-size="11" fill="#64748b">time</text>

  <!-- Day markers -->
  <line x1="100" y1="412" x2="100" y2="428" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="444" text-anchor="middle" font-size="11" fill="#64748b">Day 1</text>

  <line x1="260" y1="412" x2="260" y2="428" stroke="#475569" stroke-width="1.5"/>
  <text x="260" y="444" text-anchor="middle" font-size="11" fill="#64748b">Day 5</text>

  <line x1="420" y1="412" x2="420" y2="428" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="444" text-anchor="middle" font-size="11" fill="#64748b">Day 12</text>

  <line x1="580" y1="412" x2="580" y2="428" stroke="#475569" stroke-width="1.5"/>
  <text x="580" y="444" text-anchor="middle" font-size="11" fill="#64748b">Day 13</text>

  <line x1="720" y1="412" x2="720" y2="428" stroke="#475569" stroke-width="1.5"/>
  <text x="720" y="444" text-anchor="middle" font-size="11" fill="#64748b">Day 30</text>

  <line x1="870" y1="412" x2="870" y2="428" stroke="#475569" stroke-width="1.5"/>
  <text x="870" y="444" text-anchor="middle" font-size="11" fill="#64748b">Day 60</text>

  <!-- EVENT 1: Birth -->
  <circle cx="100" cy="420" r="8" fill="#6366f1" stroke="#a5b4fc" stroke-width="1.5"/>
  <line x1="100" y1="412" x2="100" y2="308" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="30" y="228" width="140" height="78" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="100" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#a5b4fc">✨ BORN</text>
  <text x="100" y="266" text-anchor="middle" font-size="10" fill="#c7d2fe">You say:</text>
  <text x="100" y="281" text-anchor="middle" font-size="9" fill="#06b6d4">"I live in NYC"</text>
  <text x="100" y="296" text-anchor="middle" font-size="9" fill="#64748b">→ Memory created</text>

  <!-- Horizontal memory bar 1 -->
  <rect x="100" y="380" width="320" height="24" rx="5" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="260" y="396" text-anchor="middle" font-size="10" fill="#c084fc">Memory: "Lives in NYC"  — Active</text>

  <!-- EVENT 2: Used -->
  <circle cx="260" cy="420" r="6" fill="#10b981"/>
  <line x1="260" y1="414" x2="260" y2="348" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="190" y="270" width="140" height="72" rx="10" fill="#1a3020" stroke="#10b981" stroke-width="1.5"/>
  <text x="260" y="291" text-anchor="middle" font-size="10" font-weight="700" fill="#86efac">🔄 USED</text>
  <text x="260" y="307" text-anchor="middle" font-size="9" fill="#a7f3d0">You ask AI:</text>
  <text x="260" y="321" text-anchor="middle" font-size="9" fill="#06b6d4">"Where do I live?"</text>
  <text x="260" y="335" text-anchor="middle" font-size="9" fill="#64748b">→ Memory retrieved</text>

  <!-- EVENT 3: Temp added -->
  <circle cx="420" cy="420" r="6" fill="#f59e0b"/>
  <line x1="420" y1="414" x2="420" y2="148" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="350" y="82" width="140" height="60" rx="10" fill="#3a1a00" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="103" text-anchor="middle" font-size="10" font-weight="700" fill="#fde68a">⏰ TEMP ADDED</text>
  <text x="420" y="119" text-anchor="middle" font-size="9" fill="#fde68a">"I have an exam</text>
  <text x="420" y="133" text-anchor="middle" font-size="9" fill="#fde68a">tomorrow (Day 13)"</text>

  <!-- Temp memory bar -->
  <rect x="420" y="358" width="160" height="20" rx="5" fill="#3a1a00" stroke="#f59e0b" stroke-width="1"/>
  <text x="500" y="372" text-anchor="middle" font-size="9" fill="#fde68a">Temp: "exam tomorrow"</text>

  <!-- EVENT 4: Temp expires -->
  <circle cx="580" cy="420" r="6" fill="#ef4444"/>
  <line x1="580" y1="414" x2="580" y2="168" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="510" y="100" width="140" height="62" rx="10" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="580" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#fca5a5">💨 EXPIRED</text>
  <text x="580" y="138" text-anchor="middle" font-size="9" fill="#fca5a5">Day 13 passed →</text>
  <text x="580" y="153" text-anchor="middle" font-size="9" fill="#fca5a5">"exam" auto-deleted</text>

  <!-- X over temp bar -->
  <line x1="580" y1="358" x2="640" y2="378" stroke="#ef4444" stroke-width="2"/>
  <line x1="640" y1="358" x2="580" y2="378" stroke="#ef4444" stroke-width="2"/>

  <!-- EVENT 5: Location update -->
  <circle cx="720" cy="420" r="8" fill="#8b5cf6" stroke="#c4b5fd" stroke-width="1.5"/>
  <line x1="720" y1="412" x2="720" y2="228" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="650" y="148" width="140" height="78" rx="10" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="720" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#c084fc">🔄 UPDATED</text>
  <text x="720" y="186" text-anchor="middle" font-size="9" fill="#c084fc">You say: "I moved</text>
  <text x="720" y="200" text-anchor="middle" font-size="9" fill="#c084fc">to San Francisco"</text>
  <text x="720" y="215" text-anchor="middle" font-size="9" fill="#64748b">→ Old fact replaced</text>

  <!-- Memory bar updated -->
  <line x1="420" y1="380" x2="720" y2="380" stroke="#334155" stroke-width="1"/>
  <rect x="720" y="368" width="180" height="24" rx="5" fill="#1a3020" stroke="#10b981" stroke-width="1"/>
  <text x="810" y="384" text-anchor="middle" font-size="10" fill="#6ee7b7">Memory: "Lives in SF" — Updated</text>

  <!-- Strikethrough on old -->
  <line x1="100" y1="392" x2="420" y2="392" stroke="#ef444466" stroke-width="10" opacity="0.3"/>

  <!-- EVENT 6: Profile at Day 60 -->
  <circle cx="870" cy="420" r="8" fill="#06b6d4" stroke="#a5f3fc" stroke-width="1.5"/>
  <line x1="870" y1="412" x2="870" y2="108" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="800" y="68" width="150" height="118" rx="10" fill="#083344" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="875" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#a5f3fc">📋 PROFILE TODAY</text>
  <line x1="808" y1="98" x2="942" y2="98" stroke="#155e75" stroke-width="1"/>
  <text x="875" y="113" text-anchor="middle" font-size="9" fill="#67e8f9">✓ Lives in SF</text>
  <text x="875" y="128" text-anchor="middle" font-size="9" fill="#67e8f9">✓ No exam (expired)</text>
  <text x="875" y="143" text-anchor="middle" font-size="9" fill="#94a3b8">+ all other facts...</text>
  <text x="875" y="158" text-anchor="middle" font-size="9" fill="#94a3b8">Always accurate</text>
  <text x="875" y="174" text-anchor="middle" font-size="9" fill="#94a3b8">Always fresh</text>

  <!-- Bottom message -->
  <rect x="30" y="458" width="900" height="18" rx="6" fill="#1e293b"/>
  <text x="480" y="471" text-anchor="middle" font-size="11" fill="#94a3b8">Supermemory handles all of this automatically — you never have to manage memory manually</text>
</svg>
