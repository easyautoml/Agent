<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFF"/>
      <stop offset="100%" style="stop-color:#EFF6FF"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000020"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
  </defs>

  <rect width="860" height="420" fill="url(#bg)" rx="16"/>
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E3A8A">NGINX — Traffic Director</text>
  <text x="430" y="57" text-anchor="middle" font-size="12" fill="#64748B">All requests enter on port 2026 — NGINX routes them to the right service</text>

  <!-- User -->
  <rect x="330" y="72" width="200" height="50" rx="12" fill="#374151" filter="url(#sh)"/>
  <text x="430" y="96" text-anchor="middle" font-size="14" font-weight="bold" fill="white">👤 You</text>
  <text x="430" y="113" text-anchor="middle" font-size="11" fill="#D1D5DB">browser / API / SDK</text>

  <line x1="430" y1="122" x2="430" y2="150" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="448" y="140" font-size="10" fill="#6B7280">port 2026</text>

  <!-- NGINX box -->
  <rect x="240" y="152" width="380" height="70" rx="14" fill="#1E40AF" filter="url(#sh)"/>
  <text x="430" y="180" text-anchor="middle" font-size="16" font-weight="bold" fill="white">🔀 NGINX</text>
  <text x="430" y="200" text-anchor="middle" font-size="12" fill="#BFDBFE">Single entry point — Port 2026</text>
  <text x="430" y="216" text-anchor="middle" font-size="11" fill="#93C5FD">"Which service should handle this?"</text>

  <!-- Route 1: /api/langgraph/* -->
  <path d="M 290 222 L 180 280" stroke="#2563EB" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="190" y="255" text-anchor="middle" font-size="10" fill="#1D4ED8" transform="rotate(-30, 240, 250)">/api/langgraph/*</text>

  <!-- Route 2: /api/* -->
  <path d="M 430 222 L 430 280" stroke="#059669" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>
  <text x="452" y="260" font-size="10" fill="#059669">/api/*</text>

  <!-- Route 3: / -->
  <path d="M 570 222 L 680 280" stroke="#D97706" stroke-width="2.5" fill="none" marker-end="url(#arrO)"/>
  <text x="655" y="255" text-anchor="middle" font-size="10" fill="#D97706" transform="rotate(30, 640, 250)">/  (everything else)</text>

  <!-- LangGraph Server box -->
  <rect x="40" y="282" width="260" height="100" rx="14" fill="#1D4ED8" filter="url(#sh)"/>
  <text x="170" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⚙️ LangGraph Server</text>
  <text x="170" y="330" text-anchor="middle" font-size="11" fill="#BFDBFE">Port 2024</text>
  <text x="170" y="350" text-anchor="middle" font-size="11" fill="#93C5FD">AI conversations</text>
  <text x="170" y="366" text-anchor="middle" font-size="11" fill="#93C5FD">streaming · threads</text>

  <!-- Gateway API box -->
  <rect x="300" y="282" width="260" height="100" rx="14" fill="#059669" filter="url(#sh)"/>
  <text x="430" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🗂️ Gateway API</text>
  <text x="430" y="330" text-anchor="middle" font-size="11" fill="#D1FAE5">Port 8001</text>
  <text x="430" y="350" text-anchor="middle" font-size="11" fill="#A7F3D0">models · memory</text>
  <text x="430" y="366" text-anchor="middle" font-size="11" fill="#A7F3D0">files · skills · MCP</text>

  <!-- Frontend box -->
  <rect x="560" y="282" width="260" height="100" rx="14" fill="#D97706" filter="url(#sh)"/>
  <text x="690" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🖥️ Frontend</text>
  <text x="690" y="330" text-anchor="middle" font-size="11" fill="#FDE68A">Port 3000</text>
  <text x="690" y="350" text-anchor="middle" font-size="11" fill="#FEF3C7">Next.js website</text>
  <text x="690" y="366" text-anchor="middle" font-size="11" fill="#FEF3C7">chat UI · settings</text>

  <!-- Bottom summary -->
  <rect x="80" y="394" width="700" height="18" rx="6" fill="#1E40AF"/>
  <text x="430" y="407" text-anchor="middle" font-size="11" font-weight="bold" fill="white">You never deal with ports — just open http://localhost:2026 and everything works</text>
</svg>
