<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F9FF"/>
      <stop offset="100%" style="stop-color:#E0F2FE"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000020"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0369A1"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="url(#bg)" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0C4A6E">IM Channels — Chat from Anywhere</text>
  <text x="450" y="57" text-anchor="middle" font-size="12" fill="#0369A1">Use DeerFlow directly from Telegram, Slack, or Feishu — no browser needed</text>

  <!-- Telegram -->
  <rect x="30" y="76" width="240" height="180" rx="14" fill="white" filter="url(#sh)" stroke="#93C5FD" stroke-width="2"/>
  <rect x="30" y="76" width="240" height="46" rx="14" fill="#229ED9"/>
  <rect x="30" y="104" width="240" height="18" fill="#229ED9"/>
  <text x="150" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="white">📱 Telegram</text>
  <text x="150" y="138" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">Easy to set up</text>
  <text x="150" y="158" text-anchor="middle" font-size="11" fill="#6B7280">1. Create bot via @BotFather</text>
  <text x="150" y="174" text-anchor="middle" font-size="11" fill="#6B7280">2. Get bot token</text>
  <text x="150" y="190" text-anchor="middle" font-size="11" fill="#6B7280">3. Add to config.yaml</text>
  <text x="150" y="210" text-anchor="middle" font-size="11" fill="#6B7280">Transport: long-polling</text>
  <rect x="50" y="224" width="200" height="22" rx="6" fill="#EFF6FF"/>
  <text x="150" y="239" text-anchor="middle" font-size="10" fill="#1D4ED8">No public IP required ✓</text>

  <!-- Slack -->
  <rect x="330" y="76" width="240" height="180" rx="14" fill="white" filter="url(#sh)" stroke="#93C5FD" stroke-width="2"/>
  <rect x="330" y="76" width="240" height="46" rx="14" fill="#4A154B"/>
  <rect x="330" y="104" width="240" height="18" fill="#4A154B"/>
  <text x="450" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="white">💬 Slack</text>
  <text x="450" y="138" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">Moderate setup</text>
  <text x="450" y="158" text-anchor="middle" font-size="11" fill="#6B7280">1. Create Slack app</text>
  <text x="450" y="174" text-anchor="middle" font-size="11" fill="#6B7280">2. Enable Socket Mode</text>
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#6B7280">3. Add bot permissions</text>
  <text x="450" y="210" text-anchor="middle" font-size="11" fill="#6B7280">Transport: WebSocket</text>
  <rect x="350" y="224" width="200" height="22" rx="6" fill="#EFF6FF"/>
  <text x="450" y="239" text-anchor="middle" font-size="10" fill="#1D4ED8">No public IP required ✓</text>

  <!-- Feishu -->
  <rect x="630" y="76" width="240" height="180" rx="14" fill="white" filter="url(#sh)" stroke="#93C5FD" stroke-width="2"/>
  <rect x="630" y="76" width="240" height="46" rx="14" fill="#1456F0"/>
  <rect x="630" y="104" width="240" height="18" fill="#1456F0"/>
  <text x="750" y="106" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🪶 Feishu / Lark</text>
  <text x="750" y="138" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">Streaming updates</text>
  <text x="750" y="158" text-anchor="middle" font-size="11" fill="#6B7280">1. Create Feishu app</text>
  <text x="750" y="174" text-anchor="middle" font-size="11" fill="#6B7280">2. Enable bot capability</text>
  <text x="750" y="190" text-anchor="middle" font-size="11" fill="#6B7280">3. Subscribe to events</text>
  <text x="750" y="210" text-anchor="middle" font-size="11" fill="#6B7280">Transport: WebSocket + SSE</text>
  <rect x="650" y="224" width="200" height="22" rx="6" fill="#EFF6FF"/>
  <text x="750" y="239" text-anchor="middle" font-size="10" fill="#1D4ED8">Live updating card ✓</text>

  <!-- 3 arrows to center -->
  <line x1="150" y1="256" x2="380" y2="316" stroke="#0369A1" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="256" x2="450" y2="316" stroke="#0369A1" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="750" y1="256" x2="520" y2="316" stroke="#0369A1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Channel Manager box -->
  <rect x="250" y="318" width="400" height="72" rx="14" fill="#0C4A6E" filter="url(#sh)"/>
  <text x="450" y="342" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📡 Channel Manager</text>
  <text x="450" y="362" text-anchor="middle" font-size="11" fill="#BAE6FD">Receives messages, creates threads,</text>
  <text x="450" y="378" text-anchor="middle" font-size="11" fill="#BAE6FD">routes to LangGraph Server</text>

  <line x1="450" y1="390" x2="450" y2="420" stroke="#0369A1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Commands table -->
  <rect x="180" y="422" width="540" height="60" rx="12" fill="white" filter="url(#sh)" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="450" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C4A6E">Available Commands in Chat</text>
  <text x="210" y="460" font-size="11" fill="#374151">/new  · start fresh chat</text>
  <text x="350" y="460" font-size="11" fill="#374151">/models  · list AI models</text>
  <text x="510" y="460" font-size="11" fill="#374151">/memory  · view memory</text>
  <text x="330" y="476" font-size="11" fill="#374151">/status  · current chat info    /help  · help</text>
</svg>
