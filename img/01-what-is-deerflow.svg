<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="deerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E3A8A">What is DeerFlow?</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#64748B">A Super Agent Harness — your AI assistant that can actually DO things</text>

  <!-- LEFT: Regular Chatbot -->
  <rect x="40" y="90" width="370" height="390" rx="14" fill="white" filter="url(#shadow)" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="40" y="90" width="370" height="46" rx="14" fill="url(#chatGrad)"/>
  <rect x="40" y="118" width="370" height="18" fill="url(#chatGrad)"/>
  <text x="225" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="white">😔 Regular Chatbot</text>

  <!-- chatbot items -->
  <text x="70" y="168" font-size="13" fill="#374151" font-weight="bold">What it CAN do:</text>
  <rect x="60" y="178" width="330" height="32" rx="8" fill="#F3F4F6"/>
  <text x="80" y="199" font-size="12" fill="#6B7280">💬  Answer questions with words only</text>

  <text x="70" y="238" font-size="13" fill="#374151" font-weight="bold">What it CANNOT do:</text>
  <rect x="60" y="248" width="330" height="30" rx="8" fill="#FEF2F2"/>
  <text x="80" y="268" font-size="12" fill="#DC2626">❌  Search the internet in real-time</text>
  <rect x="60" y="284" width="330" height="30" rx="8" fill="#FEF2F2"/>
  <text x="80" y="304" font-size="12" fill="#DC2626">❌  Create files (PDFs, slides, images)</text>
  <rect x="60" y="320" width="330" height="30" rx="8" fill="#FEF2F2"/>
  <text x="80" y="340" font-size="12" fill="#DC2626">❌  Run code or calculate things</text>
  <rect x="60" y="356" width="330" height="30" rx="8" fill="#FEF2F2"/>
  <text x="80" y="376" font-size="12" fill="#DC2626">❌  Remember you across sessions</text>
  <rect x="60" y="392" width="330" height="30" rx="8" fill="#FEF2F2"/>
  <text x="80" y="412" font-size="12" fill="#DC2626">❌  Work on multiple tasks at once</text>
  <rect x="60" y="428" width="330" height="30" rx="8" fill="#FEF2F2"/>
  <text x="80" y="448" font-size="12" fill="#DC2626">❌  Use your files and documents</text>

  <!-- Arrow in center -->
  <text x="450" y="310" text-anchor="middle" font-size="36">VS</text>
  <text x="450" y="340" text-anchor="middle" font-size="28">⟹</text>

  <!-- RIGHT: DeerFlow -->
  <rect x="490" y="90" width="370" height="390" rx="14" fill="white" filter="url(#shadow)" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="490" y="90" width="370" height="46" rx="14" fill="url(#deerGrad)"/>
  <rect x="490" y="118" width="370" height="18" fill="url(#deerGrad)"/>
  <text x="675" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="white">🦌 DeerFlow Super Agent</text>

  <text x="520" y="168" font-size="13" fill="#374151" font-weight="bold">What it CAN do:</text>
  <rect x="510" y="178" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="198" font-size="12" fill="#16A34A">✅  Answer questions with real-time info</text>
  <rect x="510" y="214" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="234" font-size="12" fill="#16A34A">✅  Search the internet any time</text>
  <rect x="510" y="250" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="270" font-size="12" fill="#16A34A">✅  Create reports, slides, images, code</text>
  <rect x="510" y="286" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="306" font-size="12" fill="#16A34A">✅  Run Python, bash, any code safely</text>
  <rect x="510" y="322" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="342" font-size="12" fill="#16A34A">✅  Remember your preferences forever</text>
  <rect x="510" y="358" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="378" font-size="12" fill="#16A34A">✅  Delegate tasks to multiple helpers</text>
  <rect x="510" y="394" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="414" font-size="12" fill="#16A34A">✅  Read / write your files and documents</text>
  <rect x="510" y="430" width="330" height="30" rx="8" fill="#F0FDF4"/>
  <text x="530" y="450" font-size="12" fill="#16A34A">✅  Connect to Slack, Telegram, Feishu</text>
</svg>
