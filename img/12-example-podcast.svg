<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAF9"/>
      <stop offset="100%" style="stop-color:#F5F5F4"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000018"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect width="900" height="820" fill="url(#bg)" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1C1917">Real Example: Podcast Script Request</text>
  <text x="450" y="57" text-anchor="middle" font-size="12" fill="#78716C">Step-by-step trace of: "Make me a 5-min podcast about AI news this week"</text>

  <!-- Timeline line -->
  <line x1="80" y1="90" x2="80" y2="780" stroke="#E7E5E4" stroke-width="3"/>

  <!-- Step 1 -->
  <circle cx="80" cy="106" r="22" fill="#1D4ED8"/>
  <text x="80" y="113" text-anchor="middle" font-size="15" font-weight="bold" fill="white">1</text>
  <rect x="116" y="82" width="754" height="48" rx="10" fill="white" filter="url(#sh)" stroke="#DBEAFE" stroke-width="1.2"/>
  <text x="136" y="103" font-size="13" font-weight="bold" fill="#1D4ED8">You type the request</text>
  <text x="136" y="120" font-size="12" fill="#6B7280">"Make me a 5-minute podcast script about the top AI news this week"</text>

  <line x1="80" y1="130" x2="80" y2="158" stroke="#E7E5E4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 2 -->
  <circle cx="80" cy="172" r="22" fill="#0369A1"/>
  <text x="80" y="179" text-anchor="middle" font-size="15" font-weight="bold" fill="white">2</text>
  <rect x="116" y="148" width="754" height="48" rx="10" fill="white" filter="url(#sh)" stroke="#BAE6FD" stroke-width="1.2"/>
  <text x="136" y="169" font-size="13" font-weight="bold" fill="#0369A1">NGINX routes to LangGraph</text>
  <text x="136" y="186" font-size="12" fill="#6B7280">Port 2026 → LangGraph Server at port 2024 → Lead Agent activates</text>

  <line x1="80" y1="196" x2="80" y2="224" stroke="#E7E5E4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 3 -->
  <circle cx="80" cy="238" r="22" fill="#7C3AED"/>
  <text x="80" y="245" text-anchor="middle" font-size="15" font-weight="bold" fill="white">3</text>
  <rect x="116" y="214" width="754" height="64" rx="10" fill="white" filter="url(#sh)" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="136" y="235" font-size="13" font-weight="bold" fill="#7C3AED">Middleware runs (auto)</text>
  <text x="136" y="252" font-size="12" fill="#6B7280">📁 Workspace folder created  →  🧠 Memory loaded: "User likes conversational tone"</text>
  <text x="136" y="268" font-size="12" fill="#6B7280">🛡️ Sandbox opened  →  ✅ All safety checks passed</text>

  <line x1="80" y1="278" x2="80" y2="306" stroke="#E7E5E4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 4 -->
  <circle cx="80" cy="320" r="22" fill="#1E40AF"/>
  <text x="80" y="327" text-anchor="middle" font-size="15" font-weight="bold" fill="white">4</text>
  <rect x="116" y="296" width="754" height="64" rx="10" fill="white" filter="url(#sh)" stroke="#BFDBFE" stroke-width="1.2"/>
  <text x="136" y="317" font-size="13" font-weight="bold" fill="#1E40AF">Lead Agent reads &amp; loads skills</text>
  <text x="136" y="334" font-size="12" fill="#6B7280">📚 Loads skill: "podcast-generation" + "deep-research"</text>
  <text x="136" y="350" font-size="12" fill="#6B7280">🤔 AI plans: "I need web search + script writing + file creation"</text>

  <line x1="80" y1="360" x2="80" y2="388" stroke="#E7E5E4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 5 -->
  <circle cx="80" cy="402" r="22" fill="#D97706"/>
  <text x="80" y="409" text-anchor="middle" font-size="15" font-weight="bold" fill="white">5</text>
  <rect x="116" y="378" width="754" height="100" rx="10" fill="white" filter="url(#sh)" stroke="#FDE68A" stroke-width="1.2"/>
  <text x="136" y="399" font-size="13" font-weight="bold" fill="#D97706">Two Sub-Agents spawned (in parallel)</text>
  <!-- sub-agent mini boxes -->
  <rect x="136" y="408" width="340" height="56" rx="8" fill="#FEF3C7"/>
  <text x="156" y="428" font-size="12" fill="#92400E" font-weight="bold">🔍 Sub-Agent 1: Web Search</text>
  <text x="156" y="446" font-size="11" fill="#6B7280">web_search("AI news this week")</text>
  <text x="156" y="461" font-size="11" fill="#6B7280">Reads 5 articles → extracts top stories</text>

  <rect x="494" y="408" width="360" height="56" rx="8" fill="#FEF3C7"/>
  <text x="514" y="428" font-size="12" fill="#92400E" font-weight="bold">📚 Sub-Agent 2: Format Research</text>
  <text x="514" y="446" font-size="11" fill="#6B7280">web_fetch("best podcast script structure")</text>
  <text x="514" y="461" font-size="11" fill="#6B7280">Returns ideal format + examples</text>

  <line x1="80" y1="478" x2="80" y2="506" stroke="#E7E5E4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 6 -->
  <circle cx="80" cy="520" r="22" fill="#B91C1C"/>
  <text x="80" y="527" text-anchor="middle" font-size="15" font-weight="bold" fill="white">6</text>
  <rect x="116" y="496" width="754" height="64" rx="10" fill="white" filter="url(#sh)" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="136" y="517" font-size="13" font-weight="bold" fill="#B91C1C">Sandbox executes code</text>
  <text x="136" y="534" font-size="12" fill="#6B7280">🐍 Python script runs inside Docker container</text>
  <text x="136" y="550" font-size="12" fill="#6B7280">📝 Podcast script written to /mnt/user-data/outputs/podcast_script.md</text>

  <line x1="80" y1="560" x2="80" y2="588" stroke="#E7E5E4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 7 -->
  <circle cx="80" cy="602" r="22" fill="#059669"/>
  <text x="80" y="609" text-anchor="middle" font-size="15" font-weight="bold" fill="white">7</text>
  <rect x="116" y="578" width="754" height="64" rx="10" fill="white" filter="url(#sh)" stroke="#86EFAC" stroke-width="1.2"/>
  <text x="136" y="599" font-size="13" font-weight="bold" fill="#059669">Lead Agent combines &amp; responds</text>
  <text x="136" y="616" font-size="12" fill="#6B7280">Uses present_files tool → "Here is your podcast script!"</text>
  <text x="136" y="632" font-size="12" fill="#6B7280">📎 [Download podcast_script.md]  shown in your browser or chat</text>

  <line x1="80" y1="642" x2="80" y2="670" stroke="#E7E5E4" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 8 -->
  <circle cx="80" cy="684" r="22" fill="#6B7280"/>
  <text x="80" y="691" text-anchor="middle" font-size="15" font-weight="bold" fill="white">8</text>
  <rect x="116" y="660" width="754" height="48" rx="10" fill="white" filter="url(#sh)" stroke="#E5E7EB" stroke-width="1.2"/>
  <text x="136" y="681" font-size="13" font-weight="bold" fill="#374151">Memory updates in background (30 sec later)</text>
  <text x="136" y="698" font-size="12" fill="#6B7280">Fact saved: "User likes podcast content · prefers conversational tone"</text>

  <!-- Total time badge -->
  <rect x="240" y="726" width="420" height="54" rx="14" fill="#1D4ED8" filter="url(#sh)"/>
  <text x="450" y="749" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⏱ Total time: ~2-4 minutes</text>
  <text x="450" y="769" text-anchor="middle" font-size="12" fill="#BFDBFE">No human help needed — fully automated from request to final file</text>

  <!-- Note -->
  <rect x="100" y="792" width="700" height="20" rx="6" fill="#F1F5F9"/>
  <text x="450" y="806" text-anchor="middle" font-size="11" fill="#64748B">Each session gets its own isolated workspace. Files persist until you delete the thread.</text>
</svg>
