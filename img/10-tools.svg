<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4"/>
      <stop offset="100%" style="stop-color:#DCFCE7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/></filter>
  </defs>

  <rect width="960" height="560" fill="url(#bg)" rx="16"/>
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#14532D">Tools — The Hands of DeerFlow</text>
  <text x="480" y="57" text-anchor="middle" font-size="12" fill="#166534">Tools are actions the AI can take — grouped into categories</text>

  <!-- Category 1: Sandbox Tools -->
  <rect x="30" y="74" width="435" height="200" rx="14" fill="white" filter="url(#sh)" stroke="#FCA5A5" stroke-width="1.5"/>
  <rect x="30" y="74" width="435" height="44" rx="14" fill="#B91C1C"/>
  <rect x="30" y="102" width="435" height="16" fill="#B91C1C"/>
  <text x="247" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🛡️  Sandbox Tools  (inside the safe box)</text>

  <rect x="46" y="128" width="190" height="52" rx="8" fill="#FEF2F2"/>
  <text x="70" y="148" font-size="13" fill="#B91C1C">⌨️  bash</text>
  <text x="70" y="166" font-size="10" fill="#6B7280">Run any shell command</text>

  <rect x="248" y="128" width="200" height="52" rx="8" fill="#FEF2F2"/>
  <text x="272" y="148" font-size="13" fill="#B91C1C">📖  read_file</text>
  <text x="272" y="166" font-size="10" fill="#6B7280">Open and read any file</text>

  <rect x="46" y="190" width="190" height="52" rx="8" fill="#FEF2F2"/>
  <text x="70" y="210" font-size="13" fill="#B91C1C">✏️  write_file</text>
  <text x="70" y="228" font-size="10" fill="#6B7280">Create or save a file</text>

  <rect x="248" y="190" width="200" height="52" rx="8" fill="#FEF2F2"/>
  <text x="272" y="210" font-size="13" fill="#B91C1C">🔄  str_replace</text>
  <text x="272" y="228" font-size="10" fill="#6B7280">Edit a part of a file</text>

  <rect x="148" y="252" width="190" height="14" rx="6" fill="#FEE2E2"/>
  <text x="243" y="263" text-anchor="middle" font-size="10" fill="#991B1B">🗂️  ls — list files in a folder</text>

  <!-- Category 2: Built-in Tools -->
  <rect x="495" y="74" width="435" height="200" rx="14" fill="white" filter="url(#sh)" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="495" y="74" width="435" height="44" rx="14" fill="#1D4ED8"/>
  <rect x="495" y="102" width="435" height="16" fill="#1D4ED8"/>
  <text x="712" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🔧  Built-in Tools</text>

  <rect x="511" y="128" width="190" height="52" rx="8" fill="#EFF6FF"/>
  <text x="535" y="148" font-size="13" fill="#1D4ED8">❓  ask_clarification</text>
  <text x="535" y="166" font-size="10" fill="#6B7280">Stop &amp; ask you a question</text>

  <rect x="713" y="128" width="200" height="52" rx="8" fill="#EFF6FF"/>
  <text x="737" y="148" font-size="13" fill="#1D4ED8">📁  present_files</text>
  <text x="737" y="166" font-size="10" fill="#6B7280">Show you downloadable outputs</text>

  <rect x="511" y="190" width="190" height="52" rx="8" fill="#EFF6FF"/>
  <text x="535" y="210" font-size="13" fill="#1D4ED8">🖼️  view_image</text>
  <text x="535" y="228" font-size="10" fill="#6B7280">Read &amp; analyze an image</text>

  <rect x="713" y="190" width="200" height="52" rx="8" fill="#EFF6FF"/>
  <text x="737" y="210" font-size="13" fill="#1D4ED8">🤝  task</text>
  <text x="737" y="228" font-size="10" fill="#6B7280">Spawn a sub-agent worker</text>

  <!-- Category 3: Web / Community Tools -->
  <rect x="30" y="290" width="435" height="200" rx="14" fill="white" filter="url(#sh)" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="30" y="290" width="435" height="44" rx="14" fill="#15803D"/>
  <rect x="30" y="318" width="435" height="16" fill="#15803D"/>
  <text x="247" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🌐  Web / Community Tools</text>

  <rect x="46" y="344" width="190" height="60" rx="8" fill="#F0FDF4"/>
  <text x="70" y="364" font-size="13" fill="#15803D">🔍  web_search</text>
  <text x="70" y="380" font-size="10" fill="#6B7280">Google the web via Tavily</text>
  <text x="70" y="394" font-size="10" fill="#6B7280">Returns top 5 results</text>

  <rect x="248" y="344" width="200" height="60" rx="8" fill="#F0FDF4"/>
  <text x="272" y="364" font-size="13" fill="#15803D">📰  web_fetch</text>
  <text x="272" y="380" font-size="10" fill="#6B7280">Read a specific webpage</text>
  <text x="272" y="394" font-size="10" fill="#6B7280">Jina AI · Firecrawl</text>

  <rect x="46" y="414" width="190" height="60" rx="8" fill="#F0FDF4"/>
  <text x="70" y="434" font-size="13" fill="#15803D">🖼️  image_search</text>
  <text x="70" y="450" font-size="10" fill="#6B7280">Find images via DuckDuckGo</text>
  <text x="70" y="464" font-size="10" fill="#6B7280">Free, no API key needed</text>

  <!-- Category 4: MCP Tools -->
  <rect x="495" y="290" width="435" height="200" rx="14" fill="white" filter="url(#sh)" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="495" y="290" width="435" height="44" rx="14" fill="#7C3AED"/>
  <rect x="495" y="318" width="435" height="16" fill="#7C3AED"/>
  <text x="712" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🔌  MCP Custom Tools  (plug anything in)</text>

  <rect x="511" y="344" width="190" height="60" rx="8" fill="#F5F3FF"/>
  <text x="535" y="364" font-size="13" fill="#7C3AED">🐙  GitHub</text>
  <text x="535" y="380" font-size="10" fill="#6B7280">Read issues, create PRs,</text>
  <text x="535" y="394" font-size="10" fill="#6B7280">check commits</text>

  <rect x="713" y="344" width="200" height="60" rx="8" fill="#F5F3FF"/>
  <text x="737" y="364" font-size="13" fill="#7C3AED">🗄️  Databases</text>
  <text x="737" y="380" font-size="10" fill="#6B7280">Query Postgres, MySQL,</text>
  <text x="737" y="394" font-size="10" fill="#6B7280">MongoDB, etc.</text>

  <rect x="511" y="414" width="190" height="60" rx="8" fill="#F5F3FF"/>
  <text x="535" y="434" font-size="13" fill="#7C3AED">🔧  Custom APIs</text>
  <text x="535" y="450" font-size="10" fill="#6B7280">Any REST API or</text>
  <text x="535" y="464" font-size="10" fill="#6B7280">internal service</text>

  <rect x="713" y="414" width="200" height="60" rx="8" fill="#F5F3FF"/>
  <text x="737" y="434" font-size="13" fill="#7C3AED">➕  Add Your Own</text>
  <text x="737" y="450" font-size="10" fill="#6B7280">Any MCP server plugs in</text>
  <text x="737" y="464" font-size="10" fill="#6B7280">with one config line</text>

  <!-- Bottom note -->
  <rect x="200" y="502" width="560" height="38" rx="10" fill="#14532D" filter="url(#sh)"/>
  <text x="480" y="518" text-anchor="middle" font-size="12" font-weight="bold" fill="white">💡 Tools are the "hands" — Skills are the "brain" that decides which tool to pick</text>
  <text x="480" y="534" text-anchor="middle" font-size="11" fill="#86EFAC">Together they let DeerFlow do almost anything you can imagine</text>
</svg>
