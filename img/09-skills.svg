<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB"/>
      <stop offset="100%" style="stop-color:#FEF3C7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000018"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1D4ED8"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="url(#bg)" rx="16"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#78350F">Skills — Instruction Books for the AI</text>
  <text x="450" y="57" text-anchor="middle" font-size="12" fill="#92400E">Each skill tells DeerFlow exactly how to approach a specific type of task</text>

  <!-- Left: Skill Library -->
  <rect x="30" y="76" width="280" height="460" rx="14" fill="white" filter="url(#sh)" stroke="#FCD34D" stroke-width="1.5"/>
  <rect x="30" y="76" width="280" height="44" rx="14" fill="#D97706"/>
  <rect x="30" y="104" width="280" height="16" fill="#D97706"/>
  <text x="170" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📚 Built-in Skill Library</text>

  <!-- skill items -->
  <rect x="46" y="132" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="148" font-size="12" fill="#92400E" font-weight="bold">🔍  deep-research</text>
  <text x="66" y="162" font-size="10" fill="#6B7280">Systematic web research methodology</text>

  <rect x="46" y="172" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="188" font-size="12" fill="#92400E" font-weight="bold">📄  report-generation</text>
  <text x="66" y="202" font-size="10" fill="#6B7280">Write professional structured reports</text>

  <rect x="46" y="212" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="228" font-size="12" fill="#92400E" font-weight="bold">🖼️  slide-creation</text>
  <text x="66" y="242" font-size="10" fill="#6B7280">Make PowerPoint presentations</text>

  <rect x="46" y="252" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="268" font-size="12" fill="#92400E" font-weight="bold">📊  data-analysis</text>
  <text x="66" y="282" font-size="10" fill="#6B7280">Analyze data and build charts</text>

  <rect x="46" y="292" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="308" font-size="12" fill="#92400E" font-weight="bold">🎙️  podcast-generation</text>
  <text x="66" y="322" font-size="10" fill="#6B7280">Write podcast scripts</text>

  <rect x="46" y="332" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="348" font-size="12" fill="#92400E" font-weight="bold">🎨  image-generation</text>
  <text x="66" y="362" font-size="10" fill="#6B7280">Create images via AI tools</text>

  <rect x="46" y="372" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="388" font-size="12" fill="#92400E" font-weight="bold">🌐  web-design-guidelines</text>
  <text x="66" y="402" font-size="10" fill="#6B7280">Best practices for web pages</text>

  <rect x="46" y="412" width="248" height="32" rx="8" fill="#FEF3C7"/>
  <text x="66" y="428" font-size="12" fill="#92400E" font-weight="bold">🎬  video-generation</text>
  <text x="66" y="442" font-size="10" fill="#6B7280">Create video scripts &amp; assets</text>

  <rect x="46" y="452" width="248" height="44" rx="8" fill="#FDE68A" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="170" y="470" text-anchor="middle" font-size="12" fill="#78350F" font-weight="bold">➕  Your Custom Skills</text>
  <text x="170" y="488" text-anchor="middle" font-size="10" fill="#92400E">Add any skill to skills/custom/</text>

  <!-- Middle arrows -->
  <text x="340" y="270" text-anchor="middle" font-size="13" fill="#D97706" font-weight="bold">Loaded</text>
  <text x="340" y="288" text-anchor="middle" font-size="13" fill="#D97706" font-weight="bold">only when</text>
  <text x="340" y="306" text-anchor="middle" font-size="13" fill="#D97706" font-weight="bold">needed</text>
  <text x="340" y="330" text-anchor="middle" font-size="26">⟹</text>

  <!-- Right: What a Skill Looks Like -->
  <rect x="380" y="76" width="490" height="232" rx="14" fill="white" filter="url(#sh)" stroke="#FCD34D" stroke-width="1.5"/>
  <rect x="380" y="76" width="490" height="44" rx="14" fill="#B45309"/>
  <rect x="380" y="104" width="490" height="16" fill="#B45309"/>
  <text x="625" y="106" text-anchor="middle" font-size="14" font-weight="bold" fill="white">📝 What a Skill File Looks Like</text>

  <rect x="398" y="128" width="454" height="162" rx="8" fill="#1E293B"/>
  <text x="414" y="150" font-size="11" fill="#94A3B8">--- (yaml header)</text>
  <text x="414" y="168" font-size="11" fill="#7DD3FC">name: <tspan fill="#86EFAC">deep-research</tspan></text>
  <text x="414" y="186" font-size="11" fill="#7DD3FC">description: <tspan fill="#FDE68A">Use for any web research task</tspan></text>
  <text x="414" y="204" font-size="11" fill="#94A3B8">---</text>
  <text x="414" y="222" font-size="11" fill="#F8FAFC"># Deep Research Skill</text>
  <text x="414" y="240" font-size="11" fill="#94A3B8">## When to Use</text>
  <text x="414" y="258" font-size="11" fill="#E2E8F0">- User asks "what is X", "explain X"</text>
  <text x="414" y="276" font-size="11" fill="#E2E8F0">- Needs current data from the internet</text>

  <!-- How Loading Works -->
  <rect x="380" y="320" width="490" height="216" rx="14" fill="white" filter="url(#sh)" stroke="#FCD34D" stroke-width="1.5"/>
  <rect x="380" y="320" width="490" height="44" rx="14" fill="#D97706"/>
  <rect x="380" y="348" width="490" height="16" fill="#D97706"/>
  <text x="625" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="white">⚙️ How Skills Are Loaded</text>

  <!-- flow inside -->
  <rect x="398" y="372" width="200" height="44" rx="8" fill="#DBEAFE"/>
  <text x="498" y="391" text-anchor="middle" font-size="12" fill="#1E40AF" font-weight="bold">Message arrives</text>
  <text x="498" y="407" text-anchor="middle" font-size="10" fill="#3B82F6">"make me a report"</text>

  <line x1="598" y1="394" x2="638" y2="394" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="640" y="372" width="212" height="44" rx="8" fill="#FEF3C7"/>
  <text x="746" y="391" text-anchor="middle" font-size="12" fill="#92400E" font-weight="bold">Skill detected</text>
  <text x="746" y="407" text-anchor="middle" font-size="10" fill="#D97706">"report-generation"</text>

  <line x1="746" y1="416" x2="746" y2="440" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="498" y1="416" x2="498" y2="440" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="398" y="440" width="454" height="44" rx="8" fill="#F0FDF4"/>
  <text x="625" y="459" text-anchor="middle" font-size="12" fill="#15803D" font-weight="bold">Skill content injected into system prompt</text>
  <text x="625" y="475" text-anchor="middle" font-size="10" fill="#059669">AI now has the "recipe book" open — follows the instructions</text>

  <line x1="625" y1="484" x2="625" y2="506" stroke="#D97706" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="398" y="508" width="454" height="22" rx="6" fill="#FDE68A"/>
  <text x="625" y="523" text-anchor="middle" font-size="11" fill="#78350F" font-weight="bold">💡 Only loaded when needed — keeps AI fast &amp; focused</text>
</svg>
